name: Auto Update PriceWatch Data

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download data and create log
        run: |
          # 1. 強制下載最新 JSON
          curl -s -o pricewatch.json "https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json"
          
          # 2. 建立一個 log 檔，寫入最新時間 (呢步係逼 Git 必定要有新 Commit 嘅關鍵！)
          echo "最後自動更新時間：$(date +'%Y-%m-%d %H:%M:%S')" > update_log.txt

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 將 json 同埋 log 檔一齊 add
          git add pricewatch.json update_log.txt
          
          # 因為 update_log.txt 每次內容(時間)都唔同，所以一定會 commit 成功
          git commit -m "🤖 Auto-update: 獲取最新數據 [$(date +'%Y-%m-%d %H:%M:%S')]" || true
          
          git push
