name: Auto Update PriceWatch Data

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download data and create log
        run: |
          # 1. 強制下載最新 JSON
          curl -s -o pricewatch.json "https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json"
          
          # 2. 建立一個 log 檔，並強制轉換成香港時區
          echo "最後自動更新時間：$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M:%S')" > update_log.txt

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add pricewatch.json update_log.txt
          
          # Commit message 都一併轉做香港時間
          git commit -m "🤖 Auto-update: 獲取最新數據 [$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M:%S')]" || true
          
          git push
