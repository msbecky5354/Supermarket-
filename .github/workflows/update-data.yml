name: Auto Update PriceWatch Data

on:
  schedule:
    # 每日香港時間朝早 06:30 執行 (等於 UTC 時間前一晚 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete old and download new pricewatch.json
        run: |
          rm -f pricewatch.json
          curl -s -o pricewatch.json "https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json"

      - name: Force Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add pricewatch.json
          
          # 直接強制 commit。
          # 加咗 || true 係為咗防止萬一下載失敗導致 git add 冇嘢加而報錯。
          # --allow-empty 確保就算內容完全一樣，都可以產生一條新紀錄。
          git commit --allow-empty -m "🤖 Auto-update: 強制重新下載 pricewatch.json [$(date +'%Y-%m-%d %H:%M:%S')]" || true
          
          git push
