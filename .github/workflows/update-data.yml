name: Auto Update PriceWatch Data

on:
  schedule:
    - cron: '06 22 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- COMMIT 1: Delete the file from the repository ---
      - name: Step 1 - Delete old pricewatch.json and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if the file exists before trying to delete it
          if [ -f pricewatch.json ]; then
            git rm pricewatch.json
            git commit -m "🗑️ Auto-update (Part 1): Deleted old pricewatch.json [$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M:%S')]"
            git push
            echo "✅ Old file deleted and pushed to repository."
          else
            echo "No old file found to delete. Moving on."
          fi

      # --- WAIT (Optional but recommended to let GitHub process the first push) ---
      - name: Pause for 10 seconds
        run: sleep 10

      # --- COMMIT 2: Download the new file and push ---
      - name: Step 2 - Download new data and Push
        run: |
          # Download new JSON
          curl -s -o pricewatch.json "https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json"
          
                    # Update log file (Forces a new commit)
          echo "$(TZ='Asia/Hong_Kong' date +'%Y-%m-%dT%H:%M:%S+08:00')" > update_log.txt
          
          # Add and commit the new files
          git add pricewatch.json update_log.txt
          git commit -m "🤖 Auto-update (Part 2): Added new pricewatch.json [$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M:%S')]"
          
          git push
          echo "✅ New file downloaded and pushed to repository."


      - name: 🚀 傳送 Telegram 成功通知
        if: success() # 確保前面更新成功先會響
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TG_CHAT_ID }} \
          -d text="✅ 報告老細：pricewatch.json 剛剛已經成功自動更新！"
