<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用戶手冊 | 慳真D</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-blue-600 px-5 py-4 flex items-center sticky top-0 z-10">
            <button onclick="window.history.back()" class="text-white bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-xl text-sm font-bold active:scale-95 transition flex items-center">← 返回</button>
            <h1 class="text-white font-black ml-4 text-lg">用戶手冊</h1>
        </div>
        <div class="p-6 text-sm leading-relaxed text-slate-600">
            <p class="mb-5">歡迎使用「慳真D」！本系統每日自動同步政府「網上價格一覽通」數據，助你輕鬆比較全港各大超市及連鎖商戶的價格。</p>
            <h3 class="font-bold text-slate-900 text-base mb-2">🔍 核心功能與搜尋技巧</h3>
            <ul class="list-disc pl-5 space-y-2 mb-6">
                <li><strong>智能對話式搜尋：</strong> 點選主分類後，可直接輸入「品牌」或「貨品名稱」尋找貨品。</li>
                <li><strong>一鍵篩選優惠：</strong> 善用上方「淨睇優惠」快捷鍵，只顯示有促銷活動的貨品。</li>
                <li><strong>智能換算單價：</strong> 自動計算買一送一等複雜優惠的折合單價。</li>
            </ul>
            <h3 class="font-bold text-slate-900 text-base mb-2">📱 如何加入手機主螢幕</h3>
            <p><strong>Android 系統：</strong> 用 Chrome 開啟 ➔ 點擊右上角「⋮」 ➔ 選擇「加至主畫面」。<br>
            <strong>iOS 系統：</strong> 用 Safari 開啟 ➔ 點擊底部「分享」圖示 ➔ 選擇「加入主畫面」。</p>
        </div>
    </div>
</body>
</html>
