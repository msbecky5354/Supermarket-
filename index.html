<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市精明格價網 - UI 升級版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb; }
        .category-card { transition: all 0.2s; }
        .category-card:active { transform: scale(0.95); opacity: 0.8; }
        /* 隱藏捲軸但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 text-slate-900">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 px-5 py-4 border-b border-gray-100 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight text-blue-600">超市精明格價網</h1>
            <div class="flex items-center gap-1.5 mt-0.5">
                <div id="status-dot" class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                <span id="status-text" class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">數據連線中...</span>
            </div>
        </div>
        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-5 pt-6">
        <div class="relative mb-8">
            <input type="text" id="searchBar" placeholder="搜尋 2,000+ 件超市貨品..." 
                class="w-full p-4 pl-12 bg-white border-0 shadow-sm rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400" disabled>
            <div class="absolute left-4 top-4 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>

        <div id="homeView">
            <section class="mb-8">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-1 h-5 bg-blue-600 rounded-full"></span> 貨品分類
                </h2>
                <div id="categoryGrid" class="grid grid-cols-3 gap-3">
                    <div class="animate-pulse bg-white h-24 rounded-2xl"></div>
                    <div class="animate-pulse bg-white h-24 rounded-2xl"></div>
                    <div class="animate-pulse bg-white h-24 rounded-2xl"></div>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="w-1 h-5 bg-orange-500 rounded-full"></span> 熱門搜尋
                    </h2>
                    <span class="text-xs text-blue-600 font-medium">查看更多</span>
                </div>
                <div id="featuredContainer" class="space-y-4">
                    </div>
            </section>
        </div>

        <div id="listView" class="hidden">
            <button onclick="goHome()" class="mb-5 text-blue-600 font-bold flex items-center gap-1 hover:bg-blue-50 py-1 pr-3 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg> 返回
            </button>
            <h2 id="listTitle" class="text-2xl font-black mb-6"></h2>
            <div id="listContainer" class="space-y-4"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 px-6 py-3 flex justify-between items-center z-40 max-w-2xl mx-auto shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 active-tab">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span class="text-[10px] font-bold">分類</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <span class="text-[10px] font-bold">搜尋</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <span class="text-[10px] font-bold">清單</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[10px] font-bold">設定</span>
        </button>
    </nav>

    <script>
        let structuredData = {};
        const smDict = {'WELLCOME':'惠康','PARKNSHOP':'百佳','JASONS':'Jasons','MARKETPLACE':'Market Place','AEON':'AEON','Watsons':'屈臣氏','MANNINGS':'萬寧','USELECT':'U購'};
        
        const catIcons = {
            '食品': { icon: '🍎', color: 'bg-orange-50 text-orange-600' },
            '飲品': { icon: '🥤', color: 'bg-blue-50 text-blue-600' },
            '家居用品': { icon: '🧼', color: 'bg-green-50 text-green-600' },
            '個人護理': { icon: '🪥', color: 'bg-purple-50 text-purple-600' },
            '健康食品': { icon: '💊', color: 'bg-red-50 text-red-600' },
            '寵物用品': { icon: '🐱', color: 'bg-yellow-50 text-yellow-600' }
        };

        async function init() {
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json');
                const response = await fetch(proxyUrl);
                const rawData = await response.json();
                
                rawData.forEach(item => {
                    let c1 = item.cat1Name?.['zh-Hant'] || '其他';
                    let c2 = item.cat3Name?.['zh-Hant'] || item.cat2Name?.['zh-Hant'] || '通用';
                    let name = item.name?.['zh-Hant'];
                    if (!name) return;

                    if (!structuredData[c1]) structuredData[c1] = {};
                    if (!structuredData[c1][c2]) structuredData[c1][c2] = [];
                    
                    let prices = (item.prices || []).map(p => ({
                        sm: smDict[p.supermarketCode] || p.supermarketCode,
                        val: parseFloat(p.price)
                    })).filter(p => !isNaN(p.val)).sort((a,b) => a.val - b.val);

                    structuredData[c1][c2].push({ name, brand: item.brand?.['zh-Hant'] || '', prices });
                });

                document.getElementById('status-dot').className = "w-2 h-2 bg-green-500 rounded-full";
                document.getElementById('status-text').innerText = "數據已同步";
                document.getElementById('searchBar').removeAttribute('disabled');
                document.getElementById('searchBar').addEventListener('input', handleSearch);
                
                renderHome();
            } catch (e) {
                console.error(e);
                document.getElementById('status-text').innerText = "連線失敗";
            }
        }

        function renderHome() {
            const grid = document.getElementById('categoryGrid');
            const featured = document.getElementById('featuredContainer');
            grid.innerHTML = '';
            featured.innerHTML = '';

            // 渲染主分類方塊 (參考截圖樣式)
            Object.keys(structuredData).sort().forEach(c1 => {
                const style = catIcons[c1] || { icon: '📦', color: 'bg-gray-100 text-gray-600' };
                const div = document.createElement('div');
                div.className = `category-card ${style.color} rounded-2xl p-4 flex flex-col items-center justify-center gap-2 cursor-pointer shadow-sm`;
                div.innerHTML = `<span class="text-3xl">${style.icon}</span><span class="text-xs font-bold">${c1}</span>`;
                div.onclick = () => renderSubCats(c1);
                grid.appendChild(div);
            });

            // 隨機選取 5 個貨品作為「今日推介」
            let allProds = [];
            Object.values(structuredData).forEach(subs => Object.values(subs).forEach(list => allProds.push(...list)));
            allProds.sort(() => 0.5 - Math.random()).slice(0, 5).forEach(p => {
                featured.appendChild(createProductCard(p));
            });
        }

        function renderSubCats(c1) {
            showListView(c1);
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            Object.keys(structuredData[c1]).forEach(c2 => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center cursor-pointer active:scale-95 transition-transform";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center font-bold">#</div>
                        <span class="font-bold text-gray-700">${c2}</span>
                    </div>
                    <span class="text-gray-300">❯</span>
                `;
                div.onclick = () => renderProducts(c1, c2);
                container.appendChild(div);
            });
        }

        function renderProducts(c1, c2) {
            showListView(c2);
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            structuredData[c1][c2].forEach(p => container.appendChild(createProductCard(p)));
        }

        function createProductCard(p) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-50 flex gap-4 relative overflow-hidden";
            
            let priceHtml = p.prices.length > 0 
                ? p.prices.map((pr, i) => `
                    <div class="${i===0?'text-green-600 font-bold':'text-gray-500 text-xs'} flex items-center gap-1">
                        <span class="px-1.5 py-0.5 rounded bg-gray-100 text-[10px] uppercase">${pr.sm}</span>
                        <span>$${pr.val.toFixed(1)}</span>
                    </div>`).join('')
                : '<span class="text-gray-400 text-xs text-italic">暫無價格</span>';

            card.innerHTML = `
                <div class="w-16 h-16 bg-gray-50 rounded-xl flex-shrink-0 flex items-center justify-center text-2xl">🛒</div>
                <div class="flex-1 min-w-0">
                    <div class="text-[10px] text-blue-500 font-bold uppercase tracking-tight mb-0.5">${p.brand || '一般品牌'}</div>
                    <h3 class="font-bold text-sm text-gray-800 leading-snug mb-2 truncate">${p.name}</h3>
                    <div class="flex flex-wrap gap-x-3 gap-y-1">${priceHtml}</div>
                </div>
                <button class="absolute top-3 right-3 w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 hover:text-blue-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            `;
            return card;
        }

        function handleSearch(e) {
            const q = e.target.value.trim().toLowerCase();
            if(!q) { goHome(); return; }
            showListView(`搜尋: "${q}"`);
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            let count = 0;
            Object.values(structuredData).forEach(subs => Object.values(subs).forEach(list => {
                list.forEach(p => {
                    if ((p.name + p.brand).toLowerCase().includes(q) && count < 50) {
                        container.appendChild(createProductCard(p));
                        count++;
                    }
                });
            }));
        }

        function showListView(title) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('listTitle').innerText = title;
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('searchBar').value = '';
            window.scrollTo(0,0);
        }

        init();
    </script>
</body>
</html>
