<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市精明格價網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-bold">超市價格導航</h1>
            <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div class="relative mb-6">
            <input type="text" id="searchBar" placeholder="搜尋貨品（如：食米、洗髮水）..." 
                class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <span class="absolute left-4 top-4 text-slate-400">🔍</span>
        </div>

        <section id="level1Section">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">主分類 (大概7種)</h2>
            <div id="level1Container" class="grid grid-cols-2 gap-3">
                <div class="text-center p-4 text-slate-400 text-sm col-span-2">正在讀取數據...</div>
            </div>
        </section>

        <section id="level2Section" class="hidden">
            <button onclick="showLevel1()" class="mb-4 text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1 rounded-lg">
                ← 返回主目錄
            </button>
            <h2 id="level1Title" class="text-xl font-bold mb-4 text-slate-800"></h2>
            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">請選擇子分類</h3>
            <div id="level2Container" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="productSection" class="hidden">
            <button id="backToLevel2Btn" class="mb-4 text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1 rounded-lg">
                ← 返回子分類
            </button>
            <h2 id="level2Title" class="text-2xl font-bold mb-6 text-slate-800"></h2>
            <div id="productContainer" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const level1Section = document.getElementById('level1Section');
        const level2Section = document.getElementById('level2Section');
        const productSection = document.getElementById('productSection');
        
        const level1Container = document.getElementById('level1Container');
        const level2Container = document.getElementById('level2Container');
        const productContainer = document.getElementById('productContainer');
        
        const level1Title = document.getElementById('level1Title');
        const level2Title = document.getElementById('level2Title');
        const backToLevel2Btn = document.getElementById('backToLevel2Btn');

        let allPriceData = {};

        // 1. 初始化：讀取 pricewatch.json
        async function init() {
            try {
                const response = await fetch('./pricewatch.json');
                if (!response.ok) throw new Error('無法讀取 pricewatch.json');
                
                allPriceData = await response.json();
                renderLevel1();
            } catch (e) {
                level1Container.innerHTML = '<p class="text-red-500 text-center col-span-2">讀取數據失敗，請檢查 pricewatch.json</p>';
            }
        }

        // 2. 顯示第一層 (主分類)
        function renderLevel1() {
            level1Section.classList.remove('hidden');
            level2Section.classList.add('hidden');
            productSection.classList.add('hidden');
            
            level1Container.innerHTML = '';
            const categoriesL1 = Object.keys(allPriceData);

            categoriesL1.forEach(cat1 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-5 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center';
                card.innerHTML = `<span class="text-3xl mb-2">📁</span><span class="font-bold text-slate-700">${cat1}</span>`;
                card.onclick = () => renderLevel2(cat1);
                level1Container.appendChild(card);
            });
        }

        // 3. 顯示第二層 (子分類)
        function renderLevel2(cat1) {
            level1Section.classList.add('hidden');
            level2Section.classList.remove('hidden');
            productSection.classList.add('hidden');
            
            level1Title.innerText = cat1;
            level2Container.innerHTML = '';
            
            const categoriesL2 = Object.keys(allPriceData[cat1] || {});

            categoriesL2.forEach(cat2 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center';
                card.innerHTML = `<span class="text-xl mb-1">🏷️</span><span class="font-bold text-slate-700">${cat2}</span>`;
                card.onclick = () => renderProducts(cat1, cat2);
                level2Container.appendChild(card);
            });
        }

        // 4. 顯示第三層 (貨品列表)
        function renderProducts(cat1, cat2) {
            level2Section.classList.add('hidden');
            productSection.classList.remove('hidden');
            
            level2Title.innerText = cat2;
            backToLevel2Btn.onclick = () => renderLevel2(cat1); // 動態綁定返回按鈕
            productContainer.innerHTML = '';

            const products = allPriceData[cat1][cat2] || [];

            if (products.length === 0) {
                productContainer.innerHTML = '<p class="text-slate-500 text-center">此分類下沒有貨品。</p>';
                return;
            }

            products.forEach(item => {
                const name = item.product_name || item.name || '未知商品';
                const pnsPrice = item.parknshop_price || item.pns || '--';
                const wellcomePrice = item.wellcome_price || item.wellcome || '--';

                const itemCard = document.createElement('div');
                itemCard.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4';
                itemCard.innerHTML = `
                    <div class="w-16 h-16 bg-slate-50 rounded-lg flex-shrink-0 flex items-center justify-center text-xl border border-slate-100">🛒</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800 leading-tight">${name}</h3>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <span class="text-sm px-2 py-1 bg-yellow-50 text-yellow-700 rounded-md border border-yellow-200 font-medium">百佳: $${pnsPrice}</span>
                            <span class="text-sm px-2 py-1 bg-red-50 text-red-700 rounded-md border border-red-200 font-medium">惠康: $${wellcomePrice}</span>
                        </div>
                    </div>
                `;
                productContainer.appendChild(itemCard);
            });
        }

        // 返回主分類一
        function showLevel1() {
            renderLevel1();
        }

        init();
    </script>
</body>
</html>
