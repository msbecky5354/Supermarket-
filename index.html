<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市精明格價網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-bold">超市價格導航</h1>
            <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div class="relative mb-6">
            <input type="text" id="searchBar" placeholder="搜尋貨品（如：食米、罐頭）..." 
                class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <span class="absolute left-4 top-4 text-slate-400">🔍</span>
        </div>

        <section id="categorySection">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">商品分類</h2>
            <div id="categoryContainer" class="grid grid-cols-2 gap-3">
                <div class="text-center p-4 text-slate-400 text-sm col-span-2">正在讀取最新數據...</div>
            </div>
        </section>

        <section id="productSection" class="hidden">
            <button onclick="showCategories()" class="mb-4 text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1 rounded-lg">
                ← 返回分類
            </button>
            <h2 id="currentCategoryName" class="text-2xl font-bold mb-6 text-slate-800"></h2>
            <div id="productContainer" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const categoryContainer = document.getElementById('categoryContainer');
        const productContainer = document.getElementById('productContainer');
        const categorySection = document.getElementById('categorySection');
        const productSection = document.getElementById('productSection');
        const currentCategoryName = document.getElementById('currentCategoryName');

        // 用來儲存按分類整理好的數據
        let groupedData = {};

        // 超市代碼翻譯與顏色設定
        const marketConfig = {
            'WELLCOME': { name: '惠康', color: 'bg-red-50 text-red-700 border-red-200' },
            'PARKNSHOP': { name: '百佳', color: 'bg-yellow-50 text-yellow-700 border-yellow-200' },
            'JASONS': { name: 'Market Place', color: 'bg-orange-50 text-orange-700 border-orange-200' },
            'AEON': { name: 'AEON', color: 'bg-purple-50 text-purple-700 border-purple-200' },
            'DCHFOOD': { name: '大昌食品', color: 'bg-green-50 text-green-700 border-green-200' },
            'LUNGFUNG': { name: '龍豐', color: 'bg-pink-50 text-pink-700 border-pink-200' },
            'MANNINGS': { name: '萬寧', color: 'bg-orange-50 text-orange-700 border-orange-200' },
            'WATSONS': { name: '屈臣氏', color: 'bg-teal-50 text-teal-700 border-teal-200' }
        };

        async function init() {
            try {
                // 讀取根目錄的 pricewatch.json
                const response = await fetch('./pricewatch.json');
                if (!response.ok) throw new Error('無法讀取 pricewatch.json');
                
                const rawArray = await response.json();
                
                // 執行演算法：將單一陣列按 cat2Name 分類
                rawArray.forEach(item => {
                    const catName = item.cat2Name['zh-Hant'] || '其他分類';
                    if (!groupedData[catName]) {
                        groupedData[catName] = [];
                    }
                    groupedData[catName].push(item);
                });
                
                // 渲染分類按鈕
                categoryContainer.innerHTML = '';
                const categories = Object.keys(groupedData).sort(); 
                
                categories.forEach(catName => {
                    const card = document.createElement('div');
                    card.className = 'category-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 transition-all flex flex-col items-center justify-center text-center';
                    card.innerHTML = `<span class="text-2xl mb-1">📦</span><span class="font-bold text-slate-700 text-sm">${catName}</span>`;
                    card.onclick = () => loadCategoryData(catName);
                    categoryContainer.appendChild(card);
                });

            } catch (e) {
                console.error("載入數據失敗:", e);
                categoryContainer.innerHTML = '<p class="text-red-500 text-center col-span-2 p-4 bg-red-50 rounded-lg">讀取 pricewatch.json 失敗，請確認檔案位置正確。</p>';
            }
        }

        function loadCategoryData(catName) {
            categorySection.classList.add('hidden');
            productSection.classList.remove('hidden');
            currentCategoryName.innerText = catName;
            
            const products = groupedData[catName] || [];
            productContainer.innerHTML = '';

            products.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 flex-col';
                
                const brand = item.brand['zh-Hant'] || '';
                const name = item.name['zh-Hant'] || '未知商品';
                const fullName = brand ? `[${brand}] ${name}` : name;

                // 處理格價標籤
                let priceHtml = '';
                if (item.prices && item.prices.length > 0) {
                    // 按價格由低至高排序
                    const sortedPrices = [...item.prices].sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
                    
                    sortedPrices.forEach(p => {
                        const config = marketConfig[p.supermarketCode] || { name: p.supermarketCode, color: 'bg-slate-50 text-slate-700 border-slate-200' };
                        priceHtml += `<span class="text-sm px-2 py-1 ${config.color} rounded-md border font-bold shadow-sm">${config.name}: $${p.price}</span>`;
                    });
                } else {
                    priceHtml = '<span class="text-sm text-slate-400">暫無定價資料</span>';
                }

                // 處理優惠情報 (Offers)
                let offerHtml = '';
                if (item.offers && item.offers.length > 0) {
                    const offerList = item.offers.map(o => {
                        const marketName = marketConfig[o.supermarketCode] ? marketConfig[o.supermarketCode].name : o.supermarketCode;
                        return `🎁 <span class="font-medium">${marketName}</span>: ${o['zh-Hant']}`;
                    }).join('<br>');
                    
                    offerHtml = `
                        <div class="mt-3 p-3 bg-green-50 border border-green-100 rounded-lg text-xs text-green-700 leading-relaxed">
                            ${offerList}
                        </div>
                    `;
                }

                itemCard.innerHTML = `
                    <div>
                        <h3 class="font-bold text-slate-800 leading-tight text-lg">${fullName}</h3>
                        <p class="text-xs text-slate-400 mt-1">${item.cat3Name['zh-Hant'] || ''}</p>
                    </div>
                    <div class="flex flex-wrap gap-2 mt-1">
                        ${priceHtml}
                    </div>
                    ${offerHtml}
                `;
                productContainer.appendChild(itemCard);
            });
        }

        function showCategories() {
            productSection.classList.add('hidden');
            categorySection.classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
