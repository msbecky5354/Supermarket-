    <script>
        const level1Section = document.getElementById('level1Section');
        const chatSection = document.getElementById('chatSection');
        const level1Container = document.getElementById('level1Container');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatTitle = document.getElementById('chatTitle');

        let rawApiData = [];     
        let structuredData = {}; 
        let currentLang = 'zh-Hant';
        let selectedCat1 = null; 
        
        // 🔥 修正 1：安全注入翻譯，避免變數衝突導致死機
        if(!window.uiText) {
             window.uiText = {
                 'zh-Hant': { btnOffers: '🏷️ 特價貨品', btnClear: '🔄 顯示全部', msgOffers: '為您找出以下特價貨品！🏷️', msgClear: '已顯示所有貨品！🔄' },
                 'zh-Hans': { btnOffers: '🏷️ 特价货品', btnClear: '🔄 显示全部', msgOffers: '为您找出以下特价货品！🏷️', msgClear: '已显示所有货品！🔄' },
                 'en': { btnOffers: '🏷️ Only Offers', btnClear: '🔄 Show All', msgOffers: 'Here are the items currently on offer! 🏷️', msgClear: 'Showing all items! 🔄' }
             };
        } else {
             ['zh-Hant', 'zh-Hans', 'en'].forEach(l => {
                 if(!window.uiText[l].btnOffers) {
                     if(l==='zh-Hant') { window.uiText[l].btnOffers='🏷️ 特價貨品'; window.uiText[l].btnClear='🔄 顯示全部'; window.uiText[l].msgOffers='為您找出以下特價貨品！🏷️'; window.uiText[l].msgClear='已為您載入所有貨品！🔄'; }
                     if(l==='zh-Hans') { window.uiText[l].btnOffers='🏷️ 特价货品'; window.uiText[l].btnClear='🔄 显示全部'; window.uiText[l].msgOffers='为您找出以下特价货品！🏷️'; window.uiText[l].msgClear='已为您载入所有货品！🔄'; }
                     if(l==='en') { window.uiText[l].btnOffers='🏷️ Only Offers'; window.uiText[l].btnClear='🔄 Show All'; window.uiText[l].msgOffers='Here are the items currently on offer! 🏷️'; window.uiText[l].msgClear='Showing all items! 🔄'; }
                 }
             });
        }

        const catStyles = [
            { keywords: ['奶粉', '嬰兒', 'baby'], icon: '🍼', bg: 'from-pink-100 to-rose-100', text: 'text-rose-900', border: 'border-rose-200' },
            { keywords: ['麵包', '面包', '糕', 'bakery'], icon: '🍞', bg: 'from-orange-100 to-amber-200', text: 'text-orange-900', border: 'border-orange-300' },
            { keywords: ['米', '油', '罐', 'rice', 'oil'], icon: '🍚', bg: 'from-amber-100 to-orange-100', text: 'text-orange-900', border: 'border-orange-200' },
            { keywords: ['奶', '蛋', 'dairy', 'egg'], icon: '🥚', bg: 'from-yellow-100 to-amber-100', text: 'text-amber-900', border: 'border-yellow-300' },
            { keywords: ['粉', '麵', '面', '冷', 'noodle'], icon: '🍜', bg: 'from-sky-100 to-indigo-100', text: 'text-indigo-900', border: 'border-indigo-200' },
            { keywords: ['居', '寵', 'pet'], icon: '🧻', bg: 'from-purple-100 to-fuchsia-100', text: 'text-fuchsia-900', border: 'border-fuchsia-200' },
            { keywords: ['護理', '护理', 'personal'], icon: '🧴', bg: 'from-teal-100 to-emerald-100', text: 'text-teal-900', border: 'border-teal-200' },
            { keywords: ['糖', '餅', '饼', '食', 'snack'], icon: '🍫', bg: 'from-rose-100 to-pink-200', text: 'text-rose-900', border: 'border-rose-300' },
            { keywords: ['飲', 'drink'], icon: '🧃', bg: 'from-cyan-100 to-blue-100', text: 'text-blue-900', border: 'border-blue-200' },
            { keywords: ['酒', 'wine', 'beer'], icon: '🍷', bg: 'from-fuchsia-100 to-purple-200', text: 'text-purple-900', border: 'border-purple-300' }
        ];

        async function init() {
            try {
                let data = null;
                const localResponse = await fetch('/pricewatch.json?t=' + new Date().getTime());
                if (localResponse.ok) data = await localResponse.json();
                else {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json')}`;
                    const res = await fetch(proxyUrl);
                    data = await res.json();
                }
                rawApiData = data;
                changeLanguage('zh-Hant');
            } catch (e) {
                level1Container.innerHTML = `<p class="text-red-500 text-center col-span-2">${window.uiText[currentLang]?.error || 'Error loading data'}</p>`;
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            if(window.uiText && window.uiText[lang]) {
                if(document.getElementById('appTitle')) document.getElementById('appTitle').innerText = window.uiText[lang].title || '香港生活百貨價格神器';
                if(document.getElementById('dataSourceBadge')) document.getElementById('dataSourceBadge').innerText = window.uiText[lang].badge || '政府數據連線';
                if(document.getElementById('todayStatusLabel')) document.getElementById('todayStatusLabel').innerText = window.uiText[lang].subLabel || '今日即時行情';
                if(document.getElementById('mainCatLabel')) document.getElementById('mainCatLabel').innerText = window.uiText[lang].mainCat || '第一步：選擇主分類';
                if(document.getElementById('sortTip')) document.getElementById('sortTip').innerText = window.uiText[lang].sortTip || '常用優先';
                if(document.getElementById('backBtnText')) document.getElementById('backBtnText').innerText = window.uiText[lang].back || '返回';
                if(document.getElementById('sendBtnText')) document.getElementById('sendBtnText').innerText = window.uiText[lang].send || '搜尋';
                if(chatInput) chatInput.placeholder = window.uiText[lang].placeholder || '搜尋貨品...';
                
                if(document.getElementById('btnFilterOffers')) document.getElementById('btnFilterOffers').innerText = window.uiText[lang].btnOffers;
                if(document.getElementById('btnClearFilters')) document.getElementById('btnClearFilters').innerText = window.uiText[lang].btnClear;
            }
            
            buildStructuredData();
            if (!chatSection.classList.contains('hidden')) showLevel1();
            else renderLevel1();
        }

        function buildStructuredData() {
            structuredData = {};
            rawApiData.forEach(item => {
                let cat1 = item.cat1Name?.[currentLang] || item.cat1Name?.['zh-Hant'];
                if (!cat1) return;
                let cat2 = item.cat3Name?.[currentLang] || item.cat2Name?.[currentLang] || 'Other';
                let name = item.name?.[currentLang] || item.name?.['zh-Hant'] || 'Unknown';
                let enName = item.name?.['en'] || '';
                let brandObj = item.brand || item.brandName || '';
                let localBrand = (typeof brandObj === 'object') ? (brandObj[currentLang] || brandObj['zh-Hant'] || '') : brandObj;
                let enBrand = (typeof brandObj === 'object') ? (brandObj['en'] || '') : brandObj;

                if (!structuredData[cat1]) structuredData[cat1] = {};
                if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                if (!structuredData[cat1][cat2][name]) {
                    structuredData[cat1][cat2][name] = { 
                        brand: localBrand, 
                        searchKeywords: normalizeStr(`${name} ${enName} ${localBrand} ${enBrand}`),
                        prices: [] 
                    };
                }
                
                if (Array.isArray(item.prices)) {
                    item.prices.forEach(p => {
                        let smName = (typeof supermarketDict !== 'undefined' && supermarketDict[currentLang] && supermarketDict[currentLang][p.supermarketCode]) ? supermarketDict[currentLang][p.supermarketCode] : p.supermarketCode;
                        let promoDisplay = "";
                        let promoCalcEn = ""; 
                        
                        const promoKeys = ['promotions', 'promotion', 'offer', 'promotionDesc', 'promotionName', 'itemOffsetText'];
                        
                        for (let key of promoKeys) {
                            if (p[key]) {
                                let extractedDisplay = extractDeepPromoText(p[key], currentLang);
                                if (extractedDisplay && extractedDisplay !== "[object Object]") { 
                                    promoDisplay = extractedDisplay; 
                                    promoCalcEn = extractDeepPromoText(p[key], 'en');
                                    break; 
                                }
                            }
                        }

                        if (!promoDisplay) {
                            const itemKeys = ['promotions', 'offers', 'discounts'];
                            for (let key of itemKeys) {
                                if (Array.isArray(item[key])) {
                                    const smPromo = item[key].find(pr => pr.supermarketCode === p.supermarketCode || pr.code === p.supermarketCode);
                                    if (smPromo) {
                                        let extractedDisplay = extractDeepPromoText(smPromo, currentLang);
                                        if (extractedDisplay && extractedDisplay !== "[object Object]") {
                                            promoDisplay = extractedDisplay;
                                            promoCalcEn = extractDeepPromoText(smPromo, 'en');
                                            break;
                                        }
                                    }
                                }
                            }
                        }

                        structuredData[cat1][cat2][name].prices.push({ 
                            rawCode: p.supermarketCode, 
                            supermarket: smName, 
                            price: p.price ?? '--', 
                            promoDisplay: promoDisplay,
                            promoCalc: promoCalcEn 
                        });
                    });
                }
            });
        }

        function renderLevel1() {
            level1Container.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('cat_usage_history') || '{}');
            const sorted = Object.keys(structuredData).sort((a, b) => (history[b]||0) - (history[a]||0) || a.localeCompare(b));
            sorted.forEach(cat1 => {
                const style = getCatStyle(cat1);
                const card = document.createElement('div');
                card.className = `clickable-card bg-gradient-to-br ${style.bg} p-3 rounded-[2rem] shadow-sm border ${style.border} cursor-pointer transition-all flex flex-col items-center justify-center text-center aspect-square overflow-hidden relative`;
                card.innerHTML = `<div class="text-4xl mb-2">${style.icon}</div><span class="font-bold ${style.text} text-[13px] leading-snug line-clamp-2 px-1">${cat1}</span>`;
                card.onclick = () => { history[cat1] = (history[cat1]||0)+1; localStorage.setItem('cat_usage_history', JSON.stringify(history)); startChat(cat1); };
                level1Container.appendChild(card);
            });
        }

        function getCatStyle(catName) {
            const lowerName = catName.toLowerCase();
            for (let style of catStyles) { if (style.keywords.some(kw => lowerName.includes(kw.toLowerCase()))) return style; }
            return { icon: '📦', bg: 'from-slate-100 to-slate-200', text: 'text-slate-800', border: 'border-slate-300' };
        }

        function showLevel1() { chatSection.classList.add('hidden'); level1Section.classList.remove('hidden'); renderLevel1(); }

        function startChat(cat1) {
            selectedCat1 = cat1; chatSection.classList.remove('hidden'); level1Section.classList.add('hidden');
            const style = getCatStyle(cat1);
            chatTitle.innerHTML = `<span class="mr-1.5">${style.icon}</span> ${cat1}`;
            chatMessages.innerHTML = '';
            addBotMessage(`${window.uiText[currentLang]?.chatWelcome || '你好'} <strong class="text-blue-600">${style.icon} ${cat1}</strong>。<br>${window.uiText[currentLang]?.chatAsk || '你想搵咩？'}`);
        }

        function submitChat() {
            const q = chatInput.value.trim(); if (!q) return;
            addUserMessage(q); chatInput.value = ''; chatInput.blur();
            
            setTimeout(() => {
                const talk = checkSmallTalk(q);
                if (talk) addBotMessage(talk); else performScopedSearch(q);
            }, 300);
        }

        function checkSmallTalk(q) {
            const low = q.toLowerCase();
            if (['你好', 'hi', 'hello'].some(kw => low.includes(kw))) return window.uiText[currentLang]?.replyGreeting || 'Hello!';
            if (['多謝', 'thank', '謝謝'].some(kw => low.includes(kw))) return window.uiText[currentLang]?.replyThanks || 'You are welcome!';
            return null;
        }

        function performScopedSearch(query) {
            const q = normalizeStr(query).trim();
            if (!q) {
                addBotMessage(window.uiText[currentLang]?.chatNoResult || '無結果');
                return;
            }

            const isAll = ['所有', '全部', 'all', 'list'].some(kw => q.includes(normalizeStr(kw)));
            let html = '';
            Object.keys(structuredData[selectedCat1]).forEach(cat2 => {
                Object.keys(structuredData[selectedCat1][cat2]).forEach(pName => {
                    const info = structuredData[selectedCat1][cat2][pName];
                    if (isAll || info.searchKeywords.includes(q)) html += generateProductCardHTML(pName, info);
                });
            });
            if (!html) addBotMessage(window.uiText[currentLang]?.chatNoResult || '找不到相關商品。');
            else addBotMessage(isAll ? (window.uiText[currentLang]?.chatShowAll || '為您顯示所有商品：') : (window.uiText[currentLang]?.chatFound || '找到以下商品：'), html);
        }

        // 🔥 修正 2：真正執行「篩選特價」嘅強大功能
        function performOfferSearch() {
            let html = '';
            Object.keys(structuredData[selectedCat1]).forEach(cat2 => {
                Object.keys(structuredData[selectedCat1][cat2]).forEach(pName => {
                    const info = structuredData[selectedCat1][cat2][pName];
                    let hasPromo = false;
                    
                    // 檢查呢件貨品有冇任何一間超市做緊特價
                    info.prices.forEach(p => {
                        let parsed = parseFloat(p.price);
                        let avg = typeof calculateAvgPrice === 'function' ? calculateAvgPrice(p.promoCalc, parsed) : null;
                        if (p.promoDisplay || (avg && avg > 0 && avg < parsed)) {
                            hasPromo = true;
                        }
                    });
                    
                    // 如果有特價，就生成卡片
                    if (hasPromo) {
                        html += generateProductCardHTML(pName, info);
                    }
                });
            });

            if (!html) {
                addBotMessage(currentLang === 'en' ? "Oops! No special offers found in this category right now. 😅" : "哎呀，這個分類目前未有特價貨品！😅");
            } else {
                addBotMessage(window.uiText[currentLang].msgOffers || '特價貨品如下：', html);
                
                // 視覺優化：隱藏卡片入面「冇做特價」嗰間超市，令畫面更清晰
                setTimeout(() => {
                    const containers = chatMessages.querySelectorAll('.current-result-container');
                    const latest = containers[containers.length - 1];
                    if(latest) {
                        latest.querySelectorAll('.product-card').forEach(card => {
                            card.querySelectorAll('[has-promo="false"]').forEach(row => {
                                row.style.display = 'none';
                            });
                        });
                    }
                }, 50);
            }
        }

        function addBotMessage(text, cardsHTML = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-start w-full';
            // 將 ID 換成 Class 避免衝突
            wrapper.innerHTML = `<div class="flex items-end gap-2 max-w-[90%]"><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-lg shadow-sm border border-blue-200">🤖</div><div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm text-[15px]">${text}</div></div>${cardsHTML ? `<div class="w-full mt-4 space-y-5 current-result-container">${cardsHTML}</div>` : ''}`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-end w-full';
            wrapper.innerHTML = `<div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-sm shadow-md max-w-[85%] text-[15px]">${text}</div>`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function generateProductCardHTML(pName, info) {
            let validPrices = [];
            info.prices.forEach(p => {
                let parsed = parseFloat(p.price);
                if (!isNaN(parsed)) {
                    let avg = typeof calculateAvgPrice === 'function' ? calculateAvgPrice(p.promoCalc, parsed) : null;
                    validPrices.push((avg && avg > 0 && avg < parsed) ? avg : parsed);
                }
            });
            
            let minBasePrice = Math.min(...info.prices.map(p => parseFloat(p.price)).filter(pr => !isNaN(pr)));
            let minEffectivePrice = validPrices.length > 0 ? Math.min(...validPrices) : null;
            
            let allSameBasePrice = info.prices.filter(p=>!isNaN(parseFloat(p.price))).every(v => parseFloat(v.price) === minBasePrice);
            let allSameEffectivePrice = validPrices.length > 1 && validPrices.every(v => Math.abs(v - validPrices[0]) < 0.01);

            const priceList = info.prices.map(p => {
                let parsed = parseFloat(p.price);
                let isLowestBase = (!isNaN(parsed) && parsed === minBasePrice && info.prices.length > 1 && !allSameBasePrice);
                
                let cls = 'border-slate-100 bg-slate-50/50';
                let textCls = 'text-slate-600';
                if (p.rawCode === 'WELLCOME') { cls = 'border-red-100 bg-red-50/30'; textCls = 'text-red-700'; }
                else if (p.rawCode === 'PARKNSHOP') { cls = 'border-yellow-200 bg-yellow-50/30'; textCls = 'text-yellow-800'; }
                else if (p.rawCode === 'AEON') { cls = 'border-purple-100 bg-purple-50/30'; textCls = 'text-purple-700'; }
                else if (['MANNINGS','Watsons','LUNGFUNG'].includes(p.rawCode)) { cls = 'border-blue-100 bg-blue-50/30'; textCls = 'text-blue-700'; }
                
                let avg = typeof calculateAvgPrice === 'function' ? calculateAvgPrice(p.promoCalc, parsed) : null;
                let avgText = currentLang === 'en' ? 'Avg' : '折合';
                let eaText = currentLang === 'en' ? 'ea' : '件';
                let avgLabel = '';
                let hasPromoFlag = p.promoDisplay ? 'has-promo="true"' : 'has-promo="false"'; 

                if (avg && avg > 0 && avg < parsed) {
                    let isAbsoluteLowest = (minEffectivePrice !== null && Math.abs(avg - minEffectivePrice) < 0.01 && validPrices.length > 1 && !allSameEffectivePrice);
                    let starHtml = isAbsoluteLowest ? `<span class="star-blink ml-1 text-[13px]">⭐</span>` : '';
                    avgLabel = `<span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-black shadow-sm ml-1 shrink-0 whitespace-nowrap flex items-center avg-price-badge">💰 ${avgText} $${avg.toFixed(1)}/${eaText}${starHtml}</span>`;
                    hasPromoFlag = 'has-promo="true"'; // 計算出特價都算
                }

                return `
                <div class="flex flex-col p-3 rounded-2xl border ${cls} ${isLowestBase ? 'ring-2 ring-green-400 bg-white scale-[1.01] shadow-md z-10' : ''} transition-all" ${hasPromoFlag}>
                    <div class="flex justify-between items-center w-full">
                        <span class="font-black text-[13px] ${textCls} flex items-center gap-1">${p.supermarket}</span>
                        <span class="text-[17px] font-black text-slate-800">$${isNaN(parsed) ? p.price : parsed.toFixed(1)}${isLowestBase ? ' <span class="text-lg">👍</span>' : ''}</span>
                    </div>
                    ${p.promoDisplay ? `
                    <div class="mt-2 flex flex-wrap sm:flex-nowrap items-center justify-between gap-1 w-full">
                        <span class="text-[11px] font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-md border border-red-100 break-words w-full sm:w-auto promo-text-badge">🏷️ ${p.promoDisplay}</span>
                        ${avgLabel}
                    </div>` : ''}
                </div>`;
            }).join('');
            
            return `<div class="product-card bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col gap-4 relative overflow-hidden"><div class="flex gap-4 items-start"><div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl border border-slate-100 shadow-inner shrink-0">🛒</div><div class="flex-1 min-w-0"><div class="text-[11px] text-blue-500 font-black tracking-widest uppercase mb-1">${info.brand || '&nbsp;'}</div><h3 class="font-bold text-slate-800 text-[16px] leading-tight">${pName}</h3></div></div><div class="flex flex-col gap-2.5 price-list-container">${priceList}</div></div>`;
        }

        // 🔥 綁定預設按鈕事件
        document.addEventListener('DOMContentLoaded', () => {
            const suggestionChips = document.querySelectorAll('.suggestion-chip');
            suggestionChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    const action = this.getAttribute('data-action');
                    const buttonText = this.innerText;
                    
                    addUserMessage(buttonText);

                    if (action === 'filter-offers') {
                        // 撳一下即刻摷出全部特價嘢！
                        setTimeout(() => performOfferSearch(), 300);
                    } 
                    else if (action === 'clear') {
                        // 撳一下即刻顯示返全部貨品！
                        setTimeout(() => performScopedSearch('所有'), 300);
                    }
                });
            });
        });

        init();
    </script>
