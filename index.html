<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市精明格價網 | Supermarket Price Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable-card:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col font-sans text-slate-900 overflow-hidden w-full">

    <header class="bg-white border-b flex-none z-30 p-4 shadow-sm relative">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 id="appTitle" class="text-xl bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-bold tracking-wide">超市價格導航</h1>
            <div class="flex items-center gap-3">
                <select id="langSelector" onchange="changeLanguage(this.value)" class="bg-slate-100 border-none text-sm font-medium text-slate-700 rounded-lg px-2 py-1 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                    <option value="zh-Hant">繁體中文</option>
                    <option value="zh-Hans">简体中文</option>
                    <option value="en">English</option>
                </select>
                <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-sm shadow-green-200"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden w-full max-w-2xl mx-auto relative flex flex-col">
        
        <section id="level1Section" class="absolute inset-0 overflow-y-auto no-scrollbar p-5 pb-24 bg-slate-50/50">
            <h2 id="mainCatLabel" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-5">第一步：選擇主分類</h2>
            <div id="level1Container" class="grid grid-cols-2 gap-4">
                <div id="loadingText" class="text-center p-4 text-slate-400 text-sm col-span-2">正在處理超市真實數據...</div>
            </div>
        </section>

        <section id="chatSection" class="hidden absolute inset-0 flex flex-col bg-slate-50 z-20">
            <div class="bg-white border-b px-4 py-3 flex items-center shadow-sm flex-none z-10">
                <button onclick="showLevel1()" class="text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1.5 rounded-xl mr-3 active:scale-95 transition">
                    ← <span id="backBtnText" class="ml-1">返回</span>
                </button>
                <h2 id="chatTitle" class="font-bold text-slate-800 truncate text-[15px] flex items-center"></h2>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4"></div>

            <div class="bg-white border-t p-3 pb-[max(16px,env(safe-area-inset-bottom))] flex-none shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                <form id="chatForm" class="flex gap-2 max-w-2xl mx-auto" onsubmit="event.preventDefault(); submitChat();">
                    <input type="text" id="chatInput" class="flex-1 px-4 py-3.5 bg-slate-100 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-[15px]" autocomplete="off">
                    <button type="submit" class="bg-blue-600 text-white px-5 rounded-2xl font-bold shadow-sm active:scale-95 transition flex items-center justify-center">
                        <span id="sendBtnText">搜尋</span>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <script>
        const level1Section = document.getElementById('level1Section');
        const chatSection = document.getElementById('chatSection');
        const level1Container = document.getElementById('level1Container');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatTitle = document.getElementById('chatTitle');

        let rawApiData = [];     
        let structuredData = {}; 
        let currentLang = 'zh-Hant';
        let selectedCat1 = null; 

        const uiText = {
            'zh-Hant': { 
                title: "超市價格導航", mainCat: "第一步：選擇主分類", back: "返回", loading: "正在讀取超市數據...", error: "數據載入失敗，請確認 pricewatch.json 存在", send: "搜尋", placeholder: "輸入貨品名稱...",
                chatWelcome: "您選擇了", chatAsk: "請問想尋找什麼貨品？", chatSearching: "尋找中...", chatNoResult: "找不到相關貨品，請嘗試其他字眼。", chatFound: "為您找到以下貨品："
            },
            'zh-Hans': { 
                title: "超市价格导航", mainCat: "第一步：选择主分类", back: "返回", loading: "正在读取超市数据...", error: "数据加载失败，请确认 pricewatch.json 存在", send: "搜索", placeholder: "输入商品名称...",
                chatWelcome: "您选择了", chatAsk: "请问想寻找什么商品？", chatSearching: "寻找中...", chatNoResult: "找不到相关商品，请尝试其他字眼。", chatFound: "为您找到以下商品："
            },
            'en': { 
                title: "Price Navigator", mainCat: "Step 1: Select Category", back: "Back", loading: "Loading live data...", error: "Failed to load data, ensure pricewatch.json exists", send: "Search", placeholder: "Type product name...",
                chatWelcome: "You selected", chatAsk: "What product are you looking for?", chatSearching: "Searching...", chatNoResult: "No results found, please try another keyword.", chatFound: "Found these products for you:"
            }
        };

        const supermarketDict = {
            'zh-Hant': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '萬寧', 'USELECT': 'U購' },
            'zh-Hans': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '万宁', 'USELECT': 'U购' },
            'en': { 'WELLCOME': 'Wellcome', 'PARKNSHOP': 'PARKnSHOP', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': 'Watsons', 'MANNINGS': 'Mannings', 'USELECT': 'U-Select' }
        };

        const catStyles = [
            { keywords: ['米', '食油', 'rice', 'oil', '肉'], icon: '🍚', bg: 'from-amber-100 to-orange-100', text: 'text-orange-900', border: 'border-orange-200' },
            { keywords: ['奶類', '奶类', 'dairy', '蛋', 'egg'], icon: '🥚', bg: 'from-yellow-100 to-amber-100', text: 'text-amber-900', border: 'border-yellow-300' },
            { keywords: ['粉麵', '粉面', '冷凍', '冷冻', 'noodle', 'frozen'], icon: '🍜', bg: 'from-sky-100 to-indigo-100', text: 'text-indigo-900', border: 'border-indigo-200' },
            { keywords: ['家居', 'household', '寵物', '宠物', 'pet'], icon: '🧻', bg: 'from-purple-100 to-fuchsia-100', text: 'text-fuchsia-900', border: 'border-fuchsia-200' },
            { keywords: ['個人', '个人', 'personal'], icon: '🧴', bg: 'from-teal-100 to-emerald-100', text: 'text-teal-900', border: 'border-teal-200' },
            { keywords: ['嬰兒', '婴儿', 'baby', '奶粉'], icon: '🍼', bg: 'from-pink-100 to-rose-100', text: 'text-rose-900', border: 'border-rose-200' },
            { keywords: ['糖果', '餅乾', '饼干', 'candies', 'snack', 'biscuit'], icon: '🍫', bg: 'from-rose-100 to-pink-200', text: 'text-rose-900', border: 'border-rose-300' },
            { keywords: ['飲品', '饮品', 'drink', 'beverage'], icon: '🧃', bg: 'from-cyan-100 to-blue-100', text: 'text-blue-900', border: 'border-blue-200' },
            { keywords: ['酒', 'beer', 'wine', 'spirit'], icon: '🍷', bg: 'from-fuchsia-100 to-purple-200', text: 'text-purple-900', border: 'border-purple-300' },
            { keywords: ['麵包', '面包', 'bakery', 'cereal', 'spread'], icon: '🍞', bg: 'from-orange-100 to-amber-200', text: 'text-orange-900', border: 'border-orange-300' }
        ];

        async function init() {
            try {
                document.getElementById('loadingText').innerText = uiText[currentLang].loading;
                const targetUrl = 'pricewatch.json'; 
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error('無法讀取數據');
                rawApiData = await response.json();
                changeLanguage('zh-Hant');
            } catch (e) {
                console.error(e);
                level1Container.innerHTML = `<p class="text-red-500 text-center col-span-2 p-4 bg-red-50 rounded-2xl border border-red-100">${uiText[currentLang].error}</p>`;
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.getElementById('appTitle').innerText = uiText[lang].title;
            document.getElementById('mainCatLabel').innerText = uiText[lang].mainCat;
            document.getElementById('backBtnText').innerText = uiText[lang].back;
            document.getElementById('sendBtnText').innerText = uiText[lang].send;
            chatInput.placeholder = uiText[lang].placeholder;

            buildStructuredData();
            
            if (!chatSection.classList.contains('hidden')) {
                showLevel1();
            } else {
                renderLevel1();
            }
        }

        function buildStructuredData() {
            structuredData = {};
            rawApiData.forEach(item => {
                let cat1 = item.cat1Name?.[currentLang] || item.cat1Name?.['zh-Hant'];
                if (!cat1) return;
                
                let cat2 = item.cat3Name?.[currentLang] || item.cat2Name?.[currentLang] || item.cat2Name?.['zh-Hant'] || (currentLang === 'en' ? 'Other' : '其他');
                let name = item.name?.[currentLang] || item.name?.['zh-Hant'] || (currentLang === 'en' ? 'Unknown' : '未知');
                let brand = item.brand?.[currentLang] || item.brand?.['zh-Hant'] || '';

                if (!structuredData[cat1]) structuredData[cat1] = {};
                if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                if (!structuredData[cat1][cat2][name]) {
                    structuredData[cat1][cat2][name] = { brand: brand, prices: [] };
                }
                
                if (Array.isArray(item.prices)) {
                    item.prices.forEach(p => {
                        let rawCode = p.supermarketCode || 'UNKNOWN';
                        let smName = supermarketDict[currentLang][rawCode] || rawCode; 
                        let priceVal = p.price !== undefined && p.price !== null ? p.price : '--';
                        structuredData[cat1][cat2][name].prices.push({ rawCode, supermarket: smName, price: priceVal });
                    });
                }
            });
        }

        function getCatStyle(catName) {
            const lowerName = catName.toLowerCase();
            for (let style of catStyles) {
                if (style.keywords.some(kw => lowerName.includes(kw.toLowerCase()))) {
                    return style;
                }
            }
            return { icon: '🛍️', bg: 'from-slate-100 to-slate-200', text: 'text-slate-800', border: 'border-slate-300' };
        }

        function renderLevel1() {
            level1Container.innerHTML = '';
            const categoriesL1 = Object.keys(structuredData).sort();
            categoriesL1.forEach(cat1 => {
                const style = getCatStyle(cat1);
                const card = document.createElement('div');
                
                card.className = `clickable-card bg-gradient-to-br ${style.bg} p-3 rounded-[2rem] shadow-sm border ${style.border} cursor-pointer hover:shadow-md transition-all flex flex-col items-center justify-center text-center aspect-square relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="absolute inset-0 bg-white/20 rounded-[2rem] opacity-0 hover:opacity-100 transition-opacity"></div>
                    <div class="text-4xl mb-2 drop-shadow-sm transform group-hover:scale-110 transition-transform">${style.icon}</div>
                    <span class="font-bold ${style.text} text-[13px] leading-snug z-10 line-clamp-3 px-1">${cat1}</span>
                `;
                card.onclick = () => startChat(cat1);
                level1Container.appendChild(card);
            });
        }

        function showLevel1() {
            chatSection.classList.add('hidden');
            level1Section.classList.remove('hidden');
            selectedCat1 = null;
        }

        function startChat(cat1) {
            selectedCat1 = cat1;
            level1Section.classList.add('hidden');
            chatSection.classList.remove('hidden');
            
            // 獲取目前分類對應的 Icon
            const style = getCatStyle(cat1);
            
            // 將 Icon 加到頂部標題列
            chatTitle.innerHTML = `<span class="mr-1.5 text-lg">${style.icon}</span> <span class="truncate">${cat1}</span>`;
            chatMessages.innerHTML = ''; 
            chatInput.value = '';

            // 將 Icon 加到系統歡迎對話泡泡中
            const welcomeText = `${uiText[currentLang].chatWelcome} <strong class="text-blue-600 inline-flex items-center gap-1">${style.icon} ${cat1}</strong>。<br>${uiText[currentLang].chatAsk}`;
            addBotMessage(welcomeText);
            
        }

        function submitChat() {
            const query = chatInput.value.trim();
            if (!query) return;

            addUserMessage(query);
            chatInput.value = '';
            
            chatInput.blur();

            setTimeout(() => {
                performScopedSearch(query);
            }, 300);
        }

        function performScopedSearch(query) {
            const q = query.toLowerCase();
            let resultsHTML = '';
            let count = 0;

            Object.keys(structuredData[selectedCat1]).forEach(cat2 => {
                Object.keys(structuredData[selectedCat1][cat2]).forEach(pName => {
                    const productInfo = structuredData[selectedCat1][cat2][pName];
                    const brand = (productInfo.brand || '').toLowerCase();
                    const name = pName.toLowerCase();

                    if (name.includes(q) || brand.includes(q)) {
                        count++;
                        resultsHTML += generateProductCardHTML(pName, productInfo);
                    }
                });
            });

            if (count === 0) {
                addBotMessage(uiText[currentLang].chatNoResult);
            } else {
                addBotMessage(uiText[currentLang].chatFound, resultsHTML);
            }
        }

        function addBotMessage(text, cardsHTML = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-start w-full';
            
            let content = `
                <div class="flex items-end gap-2 max-w-[90%]">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-lg flex-none mb-1 shadow-sm border border-blue-200">🤖</div>
                    <div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm text-[15px] leading-relaxed">
                        ${text}
                    </div>
                </div>
            `;

            if (cardsHTML) {
                content += `<div class="w-full pl-10 mt-3 space-y-4">${cardsHTML}</div>`;
            }

            wrapper.innerHTML = content;
            chatMessages.appendChild(wrapper);
            scrollToBottom();
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-end w-full';
            wrapper.innerHTML = `
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-sm shadow-md max-w-[85%] text-[15px]">
                    ${text}
                </div>
            `;
            chatMessages.appendChild(wrapper);
            scrollToBottom();
        }

        function generateProductCardHTML(pName, productInfo) {
            let validPrices = productInfo.prices.map(p => parseFloat(p.price)).filter(price => !isNaN(price));
            let minPrice = validPrices.length > 0 ? Math.min(...validPrices) : null;

            const priceTags = productInfo.prices.map(p => {
                let parsed = parseFloat(p.price);
                let isLowest = (!isNaN(parsed) && parsed === minPrice && minPrice !== null);
                
                let colorClass = 'bg-slate-50 text-slate-700 border-slate-200';
                if (p.rawCode === 'WELLCOME') colorClass = 'bg-red-50 text-red-700 border-red-200';
                else if (p.rawCode === 'PARKNSHOP') colorClass = 'bg-yellow-50 text-yellow-800 border-yellow-300';
                else if (p.rawCode === 'AEON') colorClass = 'bg-purple-50 text-purple-700 border-purple-200';
                else if (p.rawCode === 'MANNINGS' || p.rawCode === 'Watsons') colorClass = 'bg-blue-50 text-blue-700 border-blue-200';

                let priceText = isNaN(parsed) ? p.price : `$${parsed.toFixed(1)}`;
                
                let highlightClass = isLowest 
                    ? 'ring-2 ring-green-400 font-bold scale-[1.02] shadow-sm z-10 relative bg-white' 
                    : 'font-medium opacity-80'; 
                    
                let thumbIcon = isLowest ? `<span class="ml-1 text-base animate-bounce">👍</span>` : '';

                return `<div class="flex items-center justify-between text-[13px] px-3 py-2 rounded-xl border whitespace-nowrap flex-1 min-w-[45%] transition-all ${colorClass} ${highlightClass}">
                    <span>${p.supermarket}</span> <span class="ml-2 text-[15px]">${priceText}${thumbIcon}</span>
                </div>`;
            }).join('');

            return `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex flex-col gap-3 relative overflow-hidden">
                    <div class="flex gap-3 items-center">
                        <div class="w-12 h-12 bg-gradient-to-br from-slate-50 to-slate-100 rounded-full flex-shrink-0 flex items-center justify-center text-xl border border-slate-100 shadow-inner">🛒</div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[11px] text-blue-500 font-extrabold tracking-wide uppercase truncate">${productInfo.brand || '&nbsp;'}</div>
                            <h3 class="font-bold text-slate-800 text-[15px] leading-snug">${pName}</h3>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 items-center mt-1">
                        ${priceTags}
                    </div>
                </div>
            `;
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTo({
                    top: chatMessages.scrollHeight,
                    behavior: 'smooth'
                });
            }, 50);
        }

        init();
    </script>
</body>
</html>
