<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>香港生活百貨價格神器 | HK Essentials Price Artifact</title>
    
    <link rel="icon" type="image/png" href="price.PNG">
    <link rel="apple-touch-icon" href="price.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="價格神器">
    
    <script src="lang.js?v=1"></script>
    <script src="promoEngine.js?v=4"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable-card:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        @keyframes pulse-lightning {
            0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 2px #fbbf24); }
            50% { opacity: 0.7; transform: scale(1.1); filter: drop-shadow(0 0 8px #fbbf24); }
        }
        .lightning-icon { animation: pulse-lightning 2s infinite ease-in-out; display: inline-block; }

        @keyframes star-blink {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 3px #fde047); }
            50% { opacity: 0.5; transform: scale(1.3) rotate(15deg); filter: drop-shadow(0 0 8px #eab308); }
        }
        .star-blink { animation: star-blink 1.5s infinite ease-in-out; display: inline-block; }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col font-sans text-slate-900 overflow-hidden w-full text-[15px]">

    <header class="bg-white border-b flex-none z-30 px-4 py-3 shadow-sm relative">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <div class="flex items-center gap-1.5">
                    <span class="text-xl lightning-icon">🚀</span>
                    <h1 id="appTitle" class="text-base md:text-lg bg-gradient-to-r from-indigo-600 to-blue-700 bg-clip-text text-transparent font-black tracking-wide">香港生活百貨價格神器</h1>
                </div>
                <div class="flex items-center gap-1.5 mt-0.5 pl-7">
                    <span id="dataSourceBadge" class="inline-flex items-center px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-blue-50 text-blue-700 border border-blue-200/60 shadow-sm tracking-wider uppercase">
                        政府數據連線
                    </span>
                    <span id="todayStatusLabel" class="text-[10px] text-slate-400 font-medium tracking-wide">今日即時行情</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <select id="langSelector" onchange="changeLanguage(this.value)" class="bg-slate-100 border-none text-xs font-bold text-slate-700 rounded-lg px-2 py-1 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                    <option value="zh-Hant">繁體中文</option>
                    <option value="zh-Hans">简体中文</option>
                    <option value="en">English</option>
                </select>
                <div id="status-dot" class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-sm shadow-green-200"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden w-full max-w-2xl mx-auto relative flex flex-col">
        <section id="level1Section" class="absolute inset-0 overflow-y-auto no-scrollbar p-5 pb-24 bg-slate-50/50">
            <div class="flex justify-between items-center mb-5">
                <h2 id="mainCatLabel" class="text-sm font-bold text-slate-500 uppercase tracking-wider">第一步：選擇主分類</h2>
                <span id="sortTip" class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-bold">常用優先</span>
            </div>
            <div id="level1Container" class="grid grid-cols-2 gap-4">
                <div id="loadingText" class="text-center p-4 text-slate-400 text-sm col-span-2">正在同步最新行情...</div>
            </div>
        </section>

        <section id="chatSection" class="hidden absolute inset-0 flex flex-col bg-slate-50 z-20">
            <div class="bg-white border-b px-4 py-3 flex items-center shadow-sm flex-none z-10">
                <button onclick="showLevel1()" class="text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1.5 rounded-xl mr-3 active:scale-95 transition">
                    ← <span id="backBtnText" class="ml-1">返回</span>
                </button>
                <h2 id="chatTitle" class="font-bold text-slate-800 truncate text-[15px] flex items-center"></h2>
            </div>
            
            <div id="chatMessages" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-5"></div>
            
            <div class="bg-white border-t p-3 pb-[max(16px,env(safe-area-inset-bottom))] flex-none shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20 flex flex-col gap-2">
                <div id="quickActionChips" class="flex gap-2 overflow-x-auto no-scrollbar max-w-2xl mx-auto w-full px-1"></div>

                <form id="chatForm" class="flex gap-2 max-w-2xl mx-auto w-full" onsubmit="event.preventDefault(); submitChat();">
                    <input type="text" id="chatInput" class="flex-1 px-4 py-3.5 bg-slate-100 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-[15px]" autocomplete="off">
                    <button type="submit" class="bg-blue-600 text-white px-5 rounded-2xl font-bold shadow-sm active:scale-95 transition flex items-center justify-center shrink-0">
                        <span id="sendBtnText">搜尋</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const level1Section = document.getElementById('level1Section');
        const chatSection = document.getElementById('chatSection');
        const level1Container = document.getElementById('level1Container');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatTitle = document.getElementById('chatTitle');

        let rawApiData = [];     
        let structuredData = {}; 
        let currentLang = 'zh-Hant';
        let selectedCat1 = null; 
        let currentKeyword = ""; 

        const catStyles = [
            { keywords: ['奶粉', '嬰兒', 'baby'], icon: '🍼', bg: 'from-pink-100 to-rose-100', text: 'text-rose-900', border: 'border-rose-200' },
            { keywords: ['麵包', '面包', '糕', 'bakery'], icon: '🍞', bg: 'from-orange-100 to-amber-200', text: 'text-orange-900', border: 'border-orange-300' },
            { keywords: ['米', '油', '罐', 'rice', 'oil'], icon: '🍚', bg: 'from-amber-100 to-orange-100', text: 'text-orange-900', border: 'border-orange-200' },
            { keywords: ['奶', '蛋', 'dairy', 'egg'], icon: '🥚', bg: 'from-yellow-100 to-amber-100', text: 'text-amber-900', border: 'border-yellow-300' },
            { keywords: ['粉', '麵', '面', '冷', 'noodle'], icon: '🍜', bg: 'from-sky-100 to-indigo-100', text: 'text-indigo-900', border: 'border-indigo-200' },
            { keywords: ['居', '寵', 'pet'], icon: '🧻', bg: 'from-purple-100 to-fuchsia-100', text: 'text-fuchsia-900', border: 'border-fuchsia-200' },
            { keywords: ['護理', '护理', 'personal'], icon: '🧴', bg: 'from-teal-100 to-emerald-100', text: 'text-teal-900', border: 'border-teal-200' },
            { keywords: ['糖', '餅', '饼', '食', 'snack'], icon: '🍫', bg: 'from-rose-100 to-pink-200', text: 'text-rose-900', border: 'border-rose-300' },
            { keywords: ['飲', 'drink'], icon: '🧃', bg: 'from-cyan-100 to-blue-100', text: 'text-blue-900', border: 'border-blue-200' },
            { keywords: ['酒', 'wine', 'beer'], icon: '🍷', bg: 'from-fuchsia-100 to-purple-200', text: 'text-purple-900', border: 'border-purple-300' }
        ];

        async function init() {
            try {
                let data = null;
                const localResponse = await fetch('/pricewatch.json?t=' + new Date().getTime());
                if (localResponse.ok) data = await localResponse.json();
                else {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json')}`;
                    const res = await fetch(proxyUrl);
                    data = await res.json();
                }
                rawApiData = data;
                changeLanguage('zh-Hant');
            } catch (e) {
                level1Container.innerHTML = `<p class="text-red-500 text-center col-span-2">${uiText[currentLang].error}</p>`;
            }
        }

        // 🚀 新增：分享功能
        async function shareProduct(name, brand, minPrice) {
            const shareData = {
                title: '格價神器推介',
                text: `【慳錢情報】${brand} - ${name}，最低價見 $${minPrice}！快啲去格價神器睇吓啦！🛒`,
                url: window.location.href
            };
            try {
                if (navigator.share) { await navigator.share(shareData); }
                else {
                    navigator.clipboard.writeText(`${shareData.text} ${shareData.url}`);
                    alert('已複製格價資訊，快啲去貼畀親友啦！');
                }
            } catch (err) { console.log('Share error:', err); }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.getElementById('appTitle').innerText = uiText[lang].title;
            document.getElementById('dataSourceBadge').innerText = uiText[lang].badge;
            document.getElementById('todayStatusLabel').innerText = uiText[lang].subLabel;
            document.getElementById('mainCatLabel').innerText = uiText[lang].mainCat;
            document.getElementById('sortTip').innerText = uiText[lang].sortTip;
            document.getElementById('backBtnText').innerText = uiText[lang].back;
            document.getElementById('sendBtnText').innerText = uiText[lang].send;
            chatInput.placeholder = uiText[lang].placeholder;
            
            renderQuickActions();
            buildStructuredData();
            if (!chatSection.classList.contains('hidden')) showLevel1();
            else renderLevel1();
        }

        function renderQuickActions() {
            const container = document.getElementById('quickActionChips');
            const chips = [
                { text: uiText[currentLang].quickAll, action: "showAll" },
                { text: uiText[currentLang].quickDiscount, action: "filterDiscount" },
                { text: uiText[currentLang].quickHome, action: "goHome" },
                { text: uiText[currentLang].quickBye, action: "sayBye" }
            ];
            container.innerHTML = chips.map(c => 
                `<button type="button" onclick="handleQuickAction('${c.action}', '${c.text}')" 
                    class="whitespace-nowrap bg-blue-50 text-blue-700 border border-blue-100 px-3 py-1.5 rounded-full text-[13px] font-bold active:scale-95 transition-transform shadow-sm flex-none">
                    ${c.text}
                </button>`
            ).join('');
        }

        function handleQuickAction(action, text) {
            if (action === 'goHome') { showLevel1(); }
            else if (action === 'sayBye') {
                addUserMessage(text);
                setTimeout(() => addBotMessage(uiText[currentLang].replyThanks), 300);
            } else if (action === 'showAll') {
                addUserMessage(text);
                currentKeyword = "";
                setTimeout(() => performScopedSearch('所有'), 300);
            } else if (action === 'filterDiscount') {
                addUserMessage(text);
                setTimeout(() => performScopedSearch('__DISCOUNT_ONLY__'), 300);
            }
        }

        function buildStructuredData() {
            structuredData = {};
            rawApiData.forEach(item => {
                let cat1 = item.cat1Name?.[currentLang] || item.cat1Name?.['zh-Hant'];
                if (!cat1) return;
                let cat2 = item.cat3Name?.[currentLang] || item.cat2Name?.[currentLang] || 'Other';
                let name = item.name?.[currentLang] || item.name?.['zh-Hant'] || 'Unknown';
                let enName = item.name?.['en'] || '';
                let brandObj = item.brand || item.brandName || '';
                let localBrand = (typeof brandObj === 'object') ? (brandObj[currentLang] || brandObj['zh-Hant'] || '') : brandObj;
                let enBrand = (typeof brandObj === 'object') ? (brandObj['en'] || '') : brandObj;

                if (!structuredData[cat1]) structuredData[cat1] = {};
                if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                if (!structuredData[cat1][cat2][name]) {
                    structuredData[cat1][cat2][name] = { 
                        brand: localBrand, 
                        searchKeywords: normalizeStr(`${name} ${enName} ${localBrand} ${enBrand} ${cat2}`),
                        prices: [] 
                    };
                }
                
                if (Array.isArray(item.prices)) {
                    item.prices.forEach(p => {
                        let smName = supermarketDict[currentLang][p.supermarketCode] || p.supermarketCode;
                        let promoDisplay = "";
                        let promoCalcEn = ""; 
                        const promoKeys = ['promotions', 'promotion', 'offer', 'promotionDesc', 'promotionName', 'itemOffsetText'];
                        for (let key of promoKeys) {
                            if (p[key]) {
                                let extractedDisplay = extractDeepPromoText(p[key], currentLang);
                                if (extractedDisplay && extractedDisplay !== "[object Object]") { 
                                    promoDisplay = extractedDisplay; 
                                    promoCalcEn = extractDeepPromoText(p[key], 'en');
                                    break; 
                                }
                            }
                        }
                        if (!promoDisplay) {
                            const itemKeys = ['promotions', 'offers', 'discounts'];
                            for (let key of itemKeys) {
                                if (Array.isArray(item[key])) {
                                    const smPromo = item[key].find(pr => pr.supermarketCode === p.supermarketCode || pr.code === p.supermarketCode);
                                    if (smPromo) {
                                        let extractedDisplay = extractDeepPromoText(smPromo, currentLang);
                                        if (extractedDisplay && extractedDisplay !== "[object Object]") {
                                            promoDisplay = extractedDisplay;
                                            promoCalcEn = extractDeepPromoText(smPromo, 'en');
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                        structuredData[cat1][cat2][name].prices.push({ 
                            rawCode: p.supermarketCode, 
                            supermarket: smName, 
                            price: p.price ?? '--', 
                            promoDisplay: promoDisplay,
                            promoCalc: promoCalcEn 
                        });
                    });
                }
            });
        }

        function renderLevel1() {
            level1Container.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('cat_usage_history') || '{}');
            const sorted = Object.keys(structuredData).sort((a, b) => (history[b]||0) - (history[a]||0) || a.localeCompare(b));
            sorted.forEach(cat1 => {
                const style = getCatStyle(cat1);
                const card = document.createElement('div');
                card.className = `clickable-card bg-gradient-to-br ${style.bg} p-3 rounded-[2rem] shadow-sm border ${style.border} cursor-pointer transition-all flex flex-col items-center justify-center text-center aspect-square overflow-hidden relative`;
                card.innerHTML = `<div class="text-4xl mb-2">${style.icon}</div><span class="font-bold ${style.text} text-[13px] leading-snug line-clamp-2 px-1">${cat1}</span>`;
                card.onclick = () => { history[cat1] = (history[cat1]||0)+1; localStorage.setItem('cat_usage_history', JSON.stringify(history)); startChat(cat1); };
                level1Container.appendChild(card);
            });
        }

        function getCatStyle(catName) {
            const lowerName = catName.toLowerCase();
            for (let style of catStyles) { if (style.keywords.some(kw => lowerName.includes(kw.toLowerCase()))) return style; }
            return { icon: '📦', bg: 'from-slate-100 to-slate-200', text: 'text-slate-800', border: 'border-slate-300' };
        }

        function showLevel1() { chatSection.classList.add('hidden'); level1Section.classList.remove('hidden'); currentKeyword = ""; renderLevel1(); }

        function startChat(cat1) {
            selectedCat1 = cat1; chatSection.classList.remove('hidden'); level1Section.classList.add('hidden');
            const style = getCatStyle(cat1);
            chatTitle.innerHTML = `<span class="mr-1.5">${style.icon}</span> ${cat1}`;
            chatMessages.innerHTML = '';
            addBotMessage(`${uiText[currentLang].chatWelcome} <strong class="text-blue-600">${style.icon} ${cat1}</strong>。<br>${uiText[currentLang].chatAsk}`);
        }

        function submitChat() {
            const q = chatInput.value.trim(); if (!q) return;
            addUserMessage(q); chatInput.value = ''; chatInput.blur();
            setTimeout(() => {
                const talk = checkSmallTalk(q);
                if (talk) addBotMessage(talk); else performScopedSearch(q);
            }, 300);
        }

        function checkSmallTalk(q) {
            const low = q.toLowerCase();
            if (['你好', 'hi', 'hello'].some(kw => low.includes(kw))) return uiText[currentLang].replyGreeting;
            if (['多謝', 'thank', '謝謝'].some(kw => low.includes(kw))) return uiText[currentLang].replyThanks;
            return null;
        }

        function performScopedSearch(query) {
            const isDiscountOnly = (query === '__DISCOUNT_ONLY__');
            if (!isDiscountOnly) { currentKeyword = normalizeStr(query).trim(); }
            const isAll = ['所有', '全部', 'all', 'list'].some(kw => currentKeyword.includes(normalizeStr(kw))) || (!currentKeyword && !isDiscountOnly);
            let html = '';
            Object.keys(structuredData[selectedCat1]).forEach(cat2 => {
                Object.keys(structuredData[selectedCat1][cat2]).forEach(pName => {
                    const info = structuredData[selectedCat1][cat2][pName];
                    const hasDiscount = info.prices.some(p => p.promoDisplay || p.promoCalc);
                    const matchesKeyword = isAll || info.searchKeywords.includes(currentKeyword);
                    const matchesDiscount = !isDiscountOnly || hasDiscount;
                    if (matchesKeyword && matchesDiscount) { html += generateProductCardHTML(pName, info); }
                });
            });
            if (!html) {
                let noResultMsg = uiText[currentLang].chatNoResult;
                if (isDiscountOnly) {
                    const langMsgs = {
                        'zh-Hant': currentKeyword ? `「${currentKeyword}」暫時未有優惠貨品喎！🤷‍♂️` : "呢個分類暫時未有優惠貨品喎！🤷‍♂️",
                        'zh-Hans': currentKeyword ? `「${currentKeyword}」暂时没有优惠商品哦！🤷‍♂️` : "该分类下暂时没有优惠商品哦！🤷‍♂️",
                        'en': currentKeyword ? `No discounts for "${currentKeyword}" found! 🤷‍♂️` : "No discounted products found in this category! 🤷‍♂️"
                    };
                    noResultMsg = langMsgs[currentLang];
                }
                addBotMessage(noResultMsg);
            }
            else addBotMessage(isAll ? uiText[currentLang].chatShowAll : uiText[currentLang].chatFound, html);
        }

        function addBotMessage(text, cardsHTML = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-start w-full';
            wrapper.innerHTML = `<div class="flex items-end gap-2 max-w-[90%]"><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-lg shadow-sm border border-blue-200">🤖</div><div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm text-[15px]">${text}</div></div>${cardsHTML ? `<div class="w-full mt-4 space-y-5">${cardsHTML}</div>` : ''}`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-end w-full';
            wrapper.innerHTML = `<div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-sm shadow-md max-w-[85%] text-[15px]">${text}</div>`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function generateProductCardHTML(pName, info) {
            let validPrices = [];
            info.prices.forEach(p => {
                let parsed = parseFloat(p.price);
                if (!isNaN(parsed)) {
                    let avg = calculateAvgPrice(p.promoCalc, parsed);
                    validPrices.push((avg && avg > 0 && avg < parsed) ? avg : parsed);
                }
            });
            let minBasePrice = Math.min(...info.prices.map(p => parseFloat(p.price)).filter(pr => !isNaN(pr)));
            let minEffectivePrice = validPrices.length > 0 ? Math.min(...validPrices) : null;
            let allSameBasePrice = info.prices.filter(p=>!isNaN(parseFloat(p.price))).every(v => parseFloat(v.price) === minBasePrice);
            let allSameEffectivePrice = validPrices.length > 1 && validPrices.every(v => Math.abs(v - validPrices[0]) < 0.01);

            const priceList = info.prices.map(p => {
                let parsed = parseFloat(p.price);
                let isLowestBase = (!isNaN(parsed) && parsed === minBasePrice && info.prices.length > 1 && !allSameBasePrice);
                let cls = 'border-slate-100 bg-slate-50/50'; let textCls = 'text-slate-600';
                if (p.rawCode === 'WELLCOME') { cls = 'border-red-100 bg-red-50/30'; textCls = 'text-red-700'; }
                else if (p.rawCode === 'PARKNSHOP') { cls = 'border-yellow-200 bg-yellow-50/30'; textCls = 'text-yellow-800'; }
                else if (p.rawCode === 'AEON') { cls = 'border-purple-100 bg-purple-50/30'; textCls = 'text-purple-700'; }
                else if (['MANNINGS','Watsons','LUNGFUNG'].includes(p.rawCode)) { cls = 'border-blue-100 bg-blue-50/30'; textCls = 'text-blue-700'; }
                let avg = calculateAvgPrice(p.promoCalc, parsed);
                let avgLabel = '';
                if (avg && avg > 0 && avg < parsed) {
                    let isAbsoluteLowest = (minEffectivePrice !== null && Math.abs(avg - minEffectivePrice) < 0.01 && validPrices.length > 1 && !allSameEffectivePrice);
                    let starHtml = isAbsoluteLowest ? `<span class="star-blink ml-1 text-[13px]">⭐</span>` : '';
                    avgLabel = `<span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-black shadow-sm ml-1 shrink-0 whitespace-nowrap flex items-center">💰 ${(currentLang === 'en' ? 'Avg' : '折合')} $${avg.toFixed(1)}/${(currentLang === 'en' ? 'ea' : '件')}${starHtml}</span>`;
                }
                return `<div class="flex flex-col p-3 rounded-2xl border ${cls} ${isLowestBase ? 'ring-2 ring-green-400 bg-white scale-[1.01] shadow-md z-10' : ''} transition-all"><div class="flex justify-between items-center w-full"><span class="font-black text-[13px] ${textCls} flex items-center gap-1">${p.supermarket}</span><span class="text-[17px] font-black text-slate-800">$${isNaN(parsed) ? p.price : parsed.toFixed(1)}${isLowestBase ? ' 👍' : ''}</span></div>${p.promoDisplay ? `<div class="mt-2 flex flex-wrap sm:flex-nowrap items-center justify-between gap-1 w-full"><span class="text-[11px] font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-md border border-red-100 break-words w-full sm:w-auto">🏷️ ${p.promoDisplay}</span>${avgLabel}</div>` : ''}</div>`;
            }).join('');
            
            // 🚀 重點：加回分享按鈕
            return `<div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col gap-4 relative overflow-hidden"><div class="flex gap-4 items-start"><div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl border border-slate-100 shadow-inner shrink-0">🛒</div><div class="flex-1 min-w-0"><div class="flex justify-between items-start"><div class="text-[11px] text-blue-500 font-black tracking-widest uppercase mb-1">${info.brand || '&nbsp;'}</div><button onclick="shareProduct('${pName}', '${info.brand}', '${minBasePrice}')" class="text-blue-500 p-1 active:scale-90 transition">📤</button></div><h3 class="font-bold text-slate-800 text-[16px] leading-tight">${pName}</h3></div></div><div class="flex flex-col gap-2.5">${priceList}</div></div>`;
        }

        init();
    </script>
</body>
</html>
