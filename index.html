    <script>
        const level1Section = document.getElementById('level1Section');
        const level2Section = document.getElementById('level2Section');
        const productSection = document.getElementById('productSection');
        
        const level1Container = document.getElementById('level1Container');
        const level2Container = document.getElementById('level2Container');
        const productContainer = document.getElementById('productContainer');
        
        const level1Title = document.getElementById('level1Title');
        const level2Title = document.getElementById('level2Title');
        const backToLevel2Btn = document.getElementById('backToLevel2Btn');
        const searchBar = document.getElementById('searchBar');

        let structuredData = {};
        let allProductsFlat = []; // 新增：用於扁平化快速搜尋

        const supermarketDict = {
            'WELLCOME': '惠康',
            'PARKNSHOP': '百佳',
            'JASONS': 'Jasons',
            'MARKETPLACE': 'Market Place',
            'AEON': 'AEON',
            'Watsons': '屈臣氏',
            'MANNINGS': '萬寧',
            'USELECT': 'U購'
        };

        async function init() {
            try {
                const response = await fetch('./pricewatch.json');
                if (!response.ok) throw new Error('無法讀取 pricewatch.json');
                
                const rawData = await response.json();
                
                rawData.forEach(item => {
                    let cat1 = item.cat1Name?.['zh-Hant'] || '未分類';
                    let cat2 = item.cat3Name?.['zh-Hant'] || item.cat2Name?.['zh-Hant'] || '其他';
                    let name = item.name?.['zh-Hant'] || '未知商品';
                    let brand = item.brand?.['zh-Hant'] || '';

                    if (cat1 === '未分類') return;

                    if (!structuredData[cat1]) structuredData[cat1] = {};
                    if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                    
                    if (!structuredData[cat1][cat2][name]) {
                        structuredData[cat1][cat2][name] = { brand: brand, prices: [] };
                    }
                    
                    if (Array.isArray(item.prices)) {
                        item.prices.forEach(p => {
                            let rawCode = p.supermarketCode || '未知';
                            let smName = supermarketDict[rawCode] || rawCode;
                            let priceVal = p.price; 
                            
                            // 確保只推入有意義的價格
                            if (priceVal !== undefined && priceVal !== null) {
                                structuredData[cat1][cat2][name].prices.push({
                                    supermarket: smName,
                                    price: parseFloat(priceVal)
                                });
                            }
                        });
                    }
                });

                // 建立扁平化數據，方便搜尋欄直接一鍵搜尋全庫商品
                flattenData();
                
                // 初始化搜尋欄監聽器
                initSearch();

                renderLevel1();
            } catch (e) {
                console.error(e);
                level1Container.innerHTML = '<p class="text-red-500 text-center col-span-2 p-4 bg-red-50 rounded-lg">數據載入失敗</p>';
            }
        }

        // 扁平化數據結構
        function flattenData() {
            allProductsFlat = [];
            for (let cat1 in structuredData) {
                for (let cat2 in structuredData[cat1]) {
                    for (let pName in structuredData[cat1][cat2]) {
                        allProductsFlat.push({
                            cat1: cat1,
                            cat2: cat2,
                            name: pName,
                            brand: structuredData[cat1][cat2][pName].brand,
                            prices: structuredData[cat1][cat2][pName].prices
                        });
                    }
                }
            }
        }

        // 實作搜尋功能
        function initSearch() {
            searchBar.addEventListener('input', (e) => {
                const keyword = e.target.value.trim().toLowerCase();
                
                if (keyword === '') {
                    // 清空搜尋時，返回第一層主分類
                    renderLevel1();
                    return;
                }

                // 隱藏第一、二層，直接借用第三層展示搜尋結果
                level1Section.classList.add('hidden');
                level2Section.classList.add('hidden');
                productSection.classList.remove('hidden');
                
                level2Title.innerText = `搜尋結果: 「${keyword}」`;
                backToLevel2Btn.onclick = () => {
                    searchBar.value = '';
                    renderLevel1();
                };

                const filtered = allProductsFlat.filter(p => 
                    p.name.toLowerCase().includes(keyword) || 
                    p.brand.toLowerCase().includes(keyword) ||
                    p.cat2.toLowerCase().includes(keyword)
                );

                renderProductCards(filtered);
            });
        }

        function renderLevel1() {
            level1Section.classList.remove('hidden');
            level2Section.classList.add('hidden');
            productSection.classList.add('hidden');
            
            level1Container.innerHTML = '';
            const categoriesL1 = Object.keys(structuredData).sort();

            if (categoriesL1.length === 0) {
                level1Container.innerHTML = '<p class="text-slate-500 col-span-2 text-center">找不到分類資料</p>';
                return;
            }

            categoriesL1.forEach(cat1 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-5 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center transition-all';
                card.innerHTML = `<span class="text-3xl mb-2">📁</span><span class="font-bold text-slate-700">${cat1}</span>`;
                card.onclick = () => renderLevel2(cat1);
                level1Container.appendChild(card);
            });
        }

        function renderLevel2(cat1) {
            level1Section.classList.add('hidden');
            level2Section.classList.remove('hidden');
            productSection.classList.add('hidden');
            
            level1Title.innerText = cat1;
            level2Container.innerHTML = '';
            
            const categoriesL2 = Object.keys(structuredData[cat1]).sort();

            categoriesL2.forEach(cat2 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center transition-all';
                card.innerHTML = `<span class="text-xl mb-1">🏷️</span><span class="font-bold text-slate-700">${cat2}</span>`;
                card.onclick = () => {
                    const productsData = structuredData[cat1][cat2];
                    const list = Object.keys(productsData).sort().map(pName => ({
                        cat1: cat1,
                        cat2: cat2,
                        name: pName,
                        brand: productsData[pName].brand,
                        prices: productsData[pName].prices
                    }));
                    
                    level2Section.classList.add('hidden');
                    productSection.classList.remove('hidden');
                    level2Title.innerText = cat2;
                    backToLevel2Btn.onclick = () => renderLevel2(cat1);
                    
                    renderProductCards(list);
                };
                level2Container.appendChild(card);
            });
        }

        // 核心渲染：精準處理卡片與價格格價
        function renderProductCards(productsArray) {
            productContainer.innerHTML = '';

            if (productsArray.length === 0) {
                productContainer.innerHTML = '<p class="text-slate-500 text-center py-8">找不到相關貨品。</p>';
                return;
            }

            productsArray.forEach(product => {
                // 1. 找出該商品的最低價
                let minPrice = Infinity;
                product.prices.forEach(p => {
                    if (p.price < minPrice) minPrice = p.price;
                });

                // 2. 建立價錢標籤（加入精準排序：最低價排最前，並標示綠冠）
                const sortedPrices = [...product.prices].sort((a, b) => a.price - b.price);

                const priceTags = sortedPrices.map(p => {
                    const isMin = p.price === minPrice && minPrice !== Infinity;
                    let colorClass = 'bg-slate-50 text-slate-700 border-slate-200';
                    
                    // 最低價給予亮眼的綠色醒目提示
                    if (isMin) {
                        colorClass = 'bg-emerald-50 text-emerald-700 border-emerald-300 ring-2 ring-emerald-100 font-bold';
                    } else {
                        if (p.supermarket === '惠康') colorClass = 'bg-red-50 text-red-600 border-red-100';
                        if (p.supermarket === '百佳') colorClass = 'bg-amber-50 text-amber-700 border-amber-200';
                    }

                    const displayPrice = isNaN(p.price) ? '--' : `$${p.price.toFixed(1)}`;
                    const crown = isMin ? '👑 ' : '';

                    return `<span class="text-sm px-2.5 py-1 rounded-lg border whitespace-nowrap inline-block ${colorClass}">
                        ${crown}${p.supermarket}: ${displayPrice}
                    </span>`;
                }).join('');

                const itemCard = document.createElement('div');
                itemCard.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center hover:shadow-md transition-all';
                itemCard.innerHTML = `
                    <div class="w-16 h-16 bg-slate-50 rounded-xl flex-shrink-0 flex items-center justify-center text-2xl border border-slate-100">🛒</div>
                    <div class="flex-1 min-w-0">
                        ${product.brand ? `<div class="text-xs text-blue-500 font-bold mb-0.5 truncate">${product.brand}</div>` : ''}
                        <h3 class="font-bold text-slate-800 leading-tight text-base mb-2">${product.name}</h3>
                        <div class="flex flex-wrap gap-1.5">
                            ${priceTags || '<span class="text-xs text-slate-400">暫無各大超市報價</span>'}
                        </div>
                    </div>
                `;
                productContainer.appendChild(itemCard);
            });
        }

        function showLevel1() {
            searchBar.value = ''; // 回到主頁時清空搜尋
            renderLevel1();
        }

        init();
    </script>
