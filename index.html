<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市精明格價網 | Supermarket Price Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 id="appTitle" class="text-xl bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-bold">超市價格導航</h1>
            <div class="flex items-center gap-3">
                <select id="langSelector" onchange="changeLanguage(this.value)" class="bg-slate-100 border-none text-sm font-medium text-slate-700 rounded-lg px-2 py-1 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                    <option value="zh-Hant">繁體中文</option>
                    <option value="zh-Hans">简体中文 (GB)</option>
                    <option value="en">English</option>
                </select>
                <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div class="relative mb-6">
            <input type="text" id="searchBar" placeholder="搜尋貨品（如：嘉頓、蛋糕）..." 
                class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <span class="absolute left-4 top-4 text-slate-400">🔍</span>
        </div>

        <section id="level1Section">
            <h2 id="mainCatLabel" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">主分類</h2>
            <div id="level1Container" class="grid grid-cols-2 gap-3">
                <div id="loadingText" class="text-center p-4 text-slate-400 text-sm col-span-2">正在處理超市真實數據...</div>
            </div>
        </section>

        <section id="level2Section" class="hidden">
            <button id="backToLevel1Btn" onclick="showLevel1()" class="mb-4 text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1 rounded-lg">
                ← 返回主分類
            </button>
            <h2 id="level1Title" class="text-xl font-bold mb-4 text-slate-800"></h2>
            <h3 id="subCatLabel" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">請選擇子分類</h3>
            <div id="level2Container" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="productSection" class="hidden">
            <button id="backToLevel2Btn" class="mb-4 text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1 rounded-lg">
                ← 返回子分類
            </button>
            <h2 id="level2Title" class="text-2xl font-bold mb-6 text-slate-800"></h2>
            <div id="productContainer" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const level1Section = document.getElementById('level1Section');
        const level2Section = document.getElementById('level2Section');
        const productSection = document.getElementById('productSection');
        
        const level1Container = document.getElementById('level1Container');
        const level2Container = document.getElementById('level2Container');
        const productContainer = document.getElementById('productContainer');
        
        const level1Title = document.getElementById('level1Title');
        const level2Title = document.getElementById('level2Title');
        const backToLevel1Btn = document.getElementById('backToLevel1Btn');
        const backToLevel2Btn = document.getElementById('backToLevel2Btn');
        const searchBar = document.getElementById('searchBar');

        let rawApiData = [];     
        let structuredData = {}; 
        let currentLang = 'zh-Hant';

        const uiText = {
            'zh-Hant': { 
                title: "超市價格導航", searchPlaceholder: "搜尋貨品（如：嘉頓、蛋糕）...", mainCat: "主分類", subCatSelect: "請選擇子分類", backMain: "← 返回主分類", backSub: "← 返回子分類", noCat: "找不到分類資料", noItems: "此分類下沒有貨品。", loading: "正在處理超市真實數據...", error: "數據載入失敗", searchResult: "搜尋結果", resetSearch: "← 重設搜尋", noResult: "找不到相關貨品" 
            },
            'zh-Hans': { 
                title: "超市价格导航", searchPlaceholder: "搜索商品（如：嘉顿、蛋糕）...", mainCat: "主分类", subCatSelect: "请选择子分类", backMain: "← 返回主分类", backSub: "← 返回子分类", noCat: "找不到分类数据", noItems: "此分类下没有商品。", loading: "正在处理超市真实数据...", error: "数据加载失败", searchResult: "搜索结果", resetSearch: "← 重置搜索", noResult: "找不到相关商品" 
            },
            'en': { 
                title: "Price Navigator", searchPlaceholder: "Search (e.g., Garden, Cake)...", mainCat: "Main Categories", subCatSelect: "Select Sub-category", backMain: "← Back to Main", backSub: "← Back to Sub", noCat: "No categories found", noItems: "No products in this category.", loading: "Processing live data...", error: "Failed to load data", searchResult: "Search Results", resetSearch: "← Reset Search", noResult: "No relevant products found" 
            }
        };

        const supermarketDict = {
            'zh-Hant': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '萬寧', 'USELECT': 'U購' },
            'zh-Hans': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '万宁', 'USELECT': 'U购' },
            'en': { 'WELLCOME': 'Wellcome', 'PARKNSHOP': 'PARKnSHOP', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': 'Watsons', 'MANNINGS': 'Mannings', 'USELECT': 'U-Select' }
        };

        // 1. 啟動並讀取本地數據
        async function init() {
            try {
                document.getElementById('loadingText').innerText = uiText[currentLang].loading;
                
                // 直接讀取同目錄下的 pricewatch.json
                const targetUrl = 'pricewatch.json'; 
                
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error('無法讀取數據');
                
                rawApiData = await response.json();
                searchBar.addEventListener('input', handleSearch);
                
                // 初次載入
                changeLanguage('zh-Hant');
            } catch (e) {
                console.error(e);
                level1Container.innerHTML = `<p class="text-red-500 text-center col-span-2 p-4 bg-red-50 rounded-lg">${uiText[currentLang].error}</p>`;
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.getElementById('appTitle').innerText = uiText[lang].title;
            searchBar.placeholder = uiText[lang].searchPlaceholder;
            document.getElementById('mainCatLabel').innerText = uiText[lang].mainCat;
            document.getElementById('subCatLabel').innerText = uiText[lang].subCatSelect;
            backToLevel1Btn.innerText = uiText[lang].backMain;

            searchBar.value = ''; 
            buildStructuredData();
            renderLevel1();
        }

        function buildStructuredData() {
            structuredData = {};
            
            rawApiData.forEach(item => {
                let cat1 = item.cat1Name?.[currentLang] || item.cat1Name?.['zh-Hant'];
                if (!cat1) return;
                
                let cat2 = item.cat3Name?.[currentLang] || item.cat2Name?.[currentLang] || item.cat2Name?.['zh-Hant'] || (currentLang === 'en' ? 'Other' : '其他');
                let name = item.name?.[currentLang] || item.name?.['zh-Hant'] || (currentLang === 'en' ? 'Unknown Product' : '未知商品');
                let brand = item.brand?.[currentLang] || item.brand?.['zh-Hant'] || '';

                if (!structuredData[cat1]) structuredData[cat1] = {};
                if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                if (!structuredData[cat1][cat2][name]) {
                    structuredData[cat1][cat2][name] = { brand: brand, prices: [] };
                }
                
                if (Array.isArray(item.prices)) {
                    item.prices.forEach(p => {
                        let rawCode = p.supermarketCode || 'UNKNOWN';
                        let smName = supermarketDict[currentLang][rawCode] || rawCode; 
                        let priceVal = p.price !== undefined && p.price !== null ? p.price : '--';
                        
                        structuredData[cat1][cat2][name].prices.push({
                            rawCode: rawCode, 
                            supermarket: smName,
                            price: priceVal
                        });
                    });
                }
            });
        }

        function createProductCard(pName, productInfo) {
            const priceTags = productInfo.prices.map(p => {
                let colorClass = 'bg-slate-50 text-slate-700 border-slate-200';
                
                if (p.rawCode === 'WELLCOME') colorClass = 'bg-red-50 text-red-700 border-red-200';
                if (p.rawCode === 'PARKNSHOP') colorClass = 'bg-yellow-50 text-yellow-700 border-yellow-200';
                if (p.rawCode === 'AEON') colorClass = 'bg-purple-50 text-purple-700 border-purple-200';

                let parsed = parseFloat(p.price);
                let priceText = isNaN(parsed) ? p.price : `$${parsed.toFixed(1)}`;

                return `<span class="text-sm px-2 py-1 rounded-md border font-medium whitespace-nowrap inline-block ${colorClass}">
                    ${p.supermarket}: ${priceText}
                </span>`;
            }).join('');

            const itemCard = document.createElement('div');
            itemCard.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4';
            itemCard.innerHTML = `
                <div class="w-16 h-16 bg-slate-50 rounded-lg flex-shrink-0 flex items-center justify-center text-xl border border-slate-100">🛒</div>
                <div class="flex-1 min-w-0">
                    <div class="text-xs text-blue-500 font-bold mb-1 truncate">${productInfo.brand}</div>
                    <h3 class="font-bold text-slate-800 leading-tight">${pName}</h3>
                    <div class="mt-3 flex flex-wrap gap-2 items-start">
                        ${priceTags}
                    </div>
                </div>
            `;
            return itemCard;
        }

        function renderLevel1() {
            level1Section.classList.remove('hidden');
            level2Section.classList.add('hidden');
            productSection.classList.add('hidden');
            
            level1Container.innerHTML = '';
            const categoriesL1 = Object.keys(structuredData).sort();

            if (categoriesL1.length === 0) {
                level1Container.innerHTML = `<p class="text-slate-500 col-span-2 text-center">${uiText[currentLang].noCat}</p>`;
                return;
            }

            categoriesL1.forEach(cat1 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-5 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center';
                card.innerHTML = `<span class="text-3xl mb-2">📁</span><span class="font-bold text-slate-700">${cat1}</span>`;
                card.onclick = () => {
                    searchBar.value = ''; 
                    renderLevel2(cat1);
                };
                level1Container.appendChild(card);
            });
        }

        function renderLevel2(cat1) {
            level1Section.classList.add('hidden');
            level2Section.classList.remove('hidden');
            productSection.classList.add('hidden');
            
            level1Title.innerText = cat1;
            level2Container.innerHTML = '';
            
            const categoriesL2 = Object.keys(structuredData[cat1]).sort();

            categoriesL2.forEach(cat2 => {
                const card = document.createElement('div');
                card.className = 'clickable-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-pointer hover:border-blue-300 flex flex-col items-center text-center';
                card.innerHTML = `<span class="text-xl mb-1">🏷️</span><span class="font-bold text-slate-700">${cat2}</span>`;
                card.onclick = () => renderProducts(cat1, cat2);
                level2Container.appendChild(card);
            });
        }

        function renderProducts(cat1, cat2) {
            level1Section.classList.add('hidden');
            level2Section.classList.add('hidden');
            productSection.classList.remove('hidden');
            
            level2Title.innerText = cat2;
            backToLevel2Btn.innerText = uiText[currentLang].backSub;
            backToLevel2Btn.onclick = () => renderLevel2(cat1);
            productContainer.innerHTML = '';

            const productsData = structuredData[cat1][cat2];
            const productNames = Object.keys(productsData).sort();

            if (productNames.length === 0) {
                productContainer.innerHTML = `<p class="text-slate-500 text-center">${uiText[currentLang].noItems}</p>`;
                return;
            }

            productNames.forEach(pName => {
                const card = createProductCard(pName, productsData[pName]);
                productContainer.appendChild(card);
            });
        }

        function handleSearch(e) {
            const query = e.target.value.trim().toLowerCase();
            
            if (query === '') {
                renderLevel1();
                return;
            }

            level1Section.classList.add('hidden');
            level2Section.classList.add('hidden');
            productSection.classList.remove('hidden');

            level2Title.innerText = `${uiText[currentLang].searchResult}: "${e.target.value}"`;
            backToLevel2Btn.innerText = uiText[currentLang].resetSearch;
            backToLevel2Btn.onclick = () => {
                searchBar.value = '';
                renderLevel1();
            };

            productContainer.innerHTML = '';
            let hasResults = false;

            Object.keys(structuredData).forEach(cat1 => {
                Object.keys(structuredData[cat1]).forEach(cat2 => {
                    Object.keys(structuredData[cat1][cat2]).forEach(pName => {
                        const productInfo = structuredData[cat1][cat2][pName];
                        const brand = (productInfo.brand || '').toLowerCase();
                        const name = pName.toLowerCase();

                        if (name.includes(query) || brand.includes(query)) {
                            hasResults = true;
                            const card = createProductCard(pName, productInfo);
                            productContainer.appendChild(card);
                        }
                    });
                });
            });

            if (!hasResults) {
                productContainer.innerHTML = `<p class="text-slate-500 text-center py-8">${uiText[currentLang].noResult}</p>`;
            }
        }

        function showLevel1() {
            renderLevel1();
        }

        init();
    </script>
</body>
</html>
