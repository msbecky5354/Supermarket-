<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>香港超市精明格價網 | Supermarket Price Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable-card:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col font-sans text-slate-900 overflow-hidden w-full">

    <header class="bg-white border-b flex-none z-30 px-4 py-3 shadow-sm relative">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            
            <div class="flex flex-col">
                <div class="flex items-center gap-1.5">
                    <span class="text-xl md:text-2xl">⚡</span>
                    <h1 id="appTitle" class="text-base md:text-lg bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent font-black tracking-wide">超市精明格價網</h1>
                </div>
                <div class="flex items-center gap-1.5 mt-0.5 pl-7">
                    <span id="dataSourceBadge" class="inline-flex items-center px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-blue-50 text-blue-700 border border-blue-200/60 shadow-sm tracking-wider uppercase">
                        香港政府超市數據
                    </span>
                    <span id="todayStatusLabel" class="text-[10px] text-slate-400 font-medium tracking-wide">今日即時行情</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <select id="langSelector" onchange="changeLanguage(this.value)" class="bg-slate-100 border-none text-xs font-bold text-slate-700 rounded-lg px-2 py-1 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                    <option value="zh-Hant">繁體中文</option>
                    <option value="zh-Hans">简体中文</option>
                    <option value="en">English</option>
                </select>
                <div id="status-dot" class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-sm shadow-green-200"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden w-full max-w-2xl mx-auto relative flex flex-col">
        
        <section id="level1Section" class="absolute inset-0 overflow-y-auto no-scrollbar p-5 pb-24 bg-slate-50/50">
            <h2 id="mainCatLabel" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-5">第一步：選擇主分類</h2>
            <div id="level1Container" class="grid grid-cols-2 gap-4">
                <div id="loadingText" class="text-center p-4 text-slate-400 text-sm col-span-2">正在處理數據...</div>
            </div>
        </section>

        <section id="chatSection" class="hidden absolute inset-0 flex flex-col bg-slate-50 z-20">
            <div class="bg-white border-b px-4 py-3 flex items-center shadow-sm flex-none z-10">
                <button onclick="showLevel1()" class="text-blue-600 font-medium flex items-center bg-blue-50 px-3 py-1.5 rounded-xl mr-3 active:scale-95 transition">
                    ← <span id="backBtnText" class="ml-1">返回</span>
                </button>
                <h2 id="chatTitle" class="font-bold text-slate-800 truncate text-[15px] flex items-center"></h2>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4"></div>

            <div class="bg-white border-t p-3 pb-[max(16px,env(safe-area-inset-bottom))] flex-none shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                <form id="chatForm" class="flex gap-2 max-w-2xl mx-auto" onsubmit="event.preventDefault(); submitChat();">
                    <input type="text" id="chatInput" class="flex-1 px-4 py-3.5 bg-slate-100 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-[15px]" autocomplete="off">
                    <button type="submit" class="bg-blue-600 text-white px-5 rounded-2xl font-bold shadow-sm active:scale-95 transition flex items-center justify-center">
                        <span id="sendBtnText">搜尋</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const level1Section = document.getElementById('level1Section');
        const chatSection = document.getElementById('chatSection');
        const level1Container = document.getElementById('level1Container');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatTitle = document.getElementById('chatTitle');

        let rawApiData = [];     
        let structuredData = {}; 
        let currentLang = 'zh-Hant';
        let selectedCat1 = null; 

        const uiText = {
            'zh-Hant': { title: "超市精明格價網", badge: "香港政府超市數據", subLabel: "今日即時行情", mainCat: "第一步：選擇主分類", back: "返回", loading: "同步中...", error: "載入失敗", send: "搜尋", placeholder: "輸入名稱...", chatWelcome: "您選擇了", chatAsk: "想搵咩貨品？<br><span class='text-xs text-slate-500 mt-1 block'>（或輸入「全部」）</span>", chatSearching: "尋找中...", chatNoResult: "找不到貨品。", chatFound: "為您找到：", chatShowAll: "該分類下的所有貨品：", replyGreeting: "你好！我係格價助手 🤖，今日想搵咩？", replyThanks: "唔使客氣！仲有咩可以幫你？", replyTest: "系統運作正常 🟢", replyEmotion: "哈哈！我只係幫你格價嘅 AI 🤖" },
            'zh-Hans': { title: "超市精明格价网", badge: "香港政府超市数据", subLabel: "今日即时行情", mainCat: "第一步：选择主分类", back: "返回", loading: "同步中...", error: "加载失败", send: "搜索", placeholder: "输入名称...", chatWelcome: "您选择了", chatAsk: "想找什么商品？<br><span class='text-xs text-slate-500 mt-1 block'>（或输入「全部」）</span>", chatSearching: "寻找中...", chatNoResult: "找不到商品。", chatFound: "为您找到：", chatShowAll: "该分类下的所有商品：", replyGreeting: "你好！我是比价助手 🤖，今天想找什么？", replyThanks: "不用客气！还有什麼可以帮您？", replyTest: "系统运作正常 🟢", replyEmotion: "哈哈！我只是帮您比价的 AI 🤖" },
            'en': { title: "Price Navigator", badge: "HK Gov Supermarket Data", subLabel: "Live Daily Prices", mainCat: "Step 1: Select Category", back: "Back", loading: "Syncing...", error: "Failed to load", send: "Search", placeholder: "Type name...", chatWelcome: "Selected", chatAsk: "What are you looking for?<br><span class='text-xs text-slate-500 mt-1 block'>(Or type 'all')</span>", chatSearching: "Searching...", chatNoResult: "No results.", chatFound: "Found:", chatShowAll: "All items in this category:", replyGreeting: "Hello! I am your Price Assistant 🤖", replyThanks: "You're welcome! Anything else?", replyTest: "System OK 🟢", replyEmotion: "Haha! I am just your Price AI 🤖" }
        };

        const supermarketDict = {
            'zh-Hant': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '萬寧', 'USELECT': 'U購' },
            'zh-Hans': { 'WELLCOME': '惠康', 'PARKNSHOP': '百佳', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': '屈臣氏', 'MANNINGS': '万宁', 'USELECT': 'U购' },
            'en': { 'WELLCOME': 'Wellcome', 'PARKNSHOP': 'PARKnSHOP', 'JASONS': 'Jasons', 'MARKETPLACE': 'Market Place', 'AEON': 'AEON', 'Watsons': 'Watsons', 'MANNINGS': 'Mannings', 'USELECT': 'U-Select' }
        };

        // 🎨 強化圖案字典：將「奶粉」和「麵包」優先順序提前，防止與「奶/蛋」混淆
        const catStyles = [
            { keywords: ['奶粉', '嬰兒', '婴儿', 'baby', 'infant'], icon: '🍼', bg: 'from-pink-100 to-rose-100', text: 'text-rose-900', border: 'border-rose-200' },
            { keywords: ['麵包', '面包', '蛋糕', 'bakery', 'cereal', 'spread'], icon: '🍞', bg: 'from-orange-100 to-amber-200', text: 'text-orange-900', border: 'border-orange-300' },
            { keywords: ['米', '油', '罐', 'rice', 'oil', 'meat'], icon: '🍚', bg: 'from-amber-100 to-orange-100', text: 'text-orange-900', border: 'border-orange-200' },
            { keywords: ['奶', '大豆', '蛋', 'dairy', 'egg', 'soy'], icon: '🥚', bg: 'from-yellow-100 to-amber-100', text: 'text-amber-900', border: 'border-yellow-300' },
            { keywords: ['粉', '麵', '面', '冷', 'noodle', 'frozen'], icon: '🍜', bg: 'from-sky-100 to-indigo-100', text: 'text-indigo-900', border: 'border-indigo-200' },
            { keywords: ['居', '寵', '宠', 'household', 'pet'], icon: '🧻', bg: 'from-purple-100 to-fuchsia-100', text: 'text-fuchsia-900', border: 'border-fuchsia-200' },
            { keywords: ['護理', '护理', 'personal', 'care'], icon: '🧴', bg: 'from-teal-100 to-emerald-100', text: 'text-teal-900', border: 'border-teal-200' },
            { keywords: ['糖', '餅', '饼', '食', 'candies', 'snack', 'biscuit'], icon: '🍫', bg: 'from-rose-100 to-pink-200', text: 'text-rose-900', border: 'border-rose-300' },
            { keywords: ['飲', '饮', 'drink', 'beverage'], icon: '🧃', bg: 'from-cyan-100 to-blue-100', text: 'text-blue-900', border: 'border-blue-200' },
            { keywords: ['酒', 'beer', 'wine', 'spirit'], icon: '🍷', bg: 'from-fuchsia-100 to-purple-200', text: 'text-purple-900', border: 'border-purple-300' }
        ];

        async function init() {
            try {
                document.getElementById('loadingText').innerText = uiText[currentLang].loading;
                let data = null;
                try {
                    const localResponse = await fetch('/pricewatch.json?t=' + new Date().getTime());
                    if (localResponse.ok) data = await localResponse.json();
                    else throw new Error('Local fail');
                } catch (e) {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://online-price-watch.consumer.org.hk/opw/opendata/pricewatch.json')}`;
                    const res = await fetch(proxyUrl);
                    data = await res.json();
                }
                rawApiData = data;
                changeLanguage('zh-Hant');
            } catch (e) {
                level1Container.innerHTML = `<p class="text-red-500 text-center col-span-2">${uiText[currentLang].error}</p>`;
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.getElementById('appTitle').innerText = uiText[lang].title;
            document.getElementById('dataSourceBadge').innerText = uiText[lang].badge;
            document.getElementById('todayStatusLabel').innerText = uiText[lang].subLabel;
            document.getElementById('mainCatLabel').innerText = uiText[lang].mainCat;
            document.getElementById('backBtnText').innerText = uiText[lang].back;
            document.getElementById('sendBtnText').innerText = uiText[lang].send;
            chatInput.placeholder = uiText[lang].placeholder;
            buildStructuredData();
            if (!chatSection.classList.contains('hidden')) showLevel1();
            else renderLevel1();
        }

        function buildStructuredData() {
            structuredData = {};
            rawApiData.forEach(item => {
                let cat1 = item.cat1Name?.[currentLang] || item.cat1Name?.['zh-Hant'];
                if (!cat1) return;
                let cat2 = item.cat3Name?.[currentLang] || item.cat2Name?.[currentLang] || item.cat2Name?.['zh-Hant'] || 'Other';
                let name = item.name?.[currentLang] || item.name?.['zh-Hant'] || 'Unknown';
                let brand = item.brand?.[currentLang] || item.brand?.['zh-Hant'] || '';
                if (!structuredData[cat1]) structuredData[cat1] = {};
                if (!structuredData[cat1][cat2]) structuredData[cat1][cat2] = {};
                if (!structuredData[cat1][cat2][name]) structuredData[cat1][cat2][name] = { brand, prices: [] };
                if (Array.isArray(item.prices)) {
                    item.prices.forEach(p => {
                        let smName = supermarketDict[currentLang][p.supermarketCode] || p.supermarketCode;
                        structuredData[cat1][cat2][name].prices.push({ rawCode: p.supermarketCode, supermarket: smName, price: p.price ?? '--' });
                    });
                }
            });
        }

        function getCatStyle(catName) {
            const lowerName = catName.toLowerCase();
            // 比對順序依照字典陣列順序，確保長詞優先
            for (let style of catStyles) {
                if (style.keywords.some(kw => lowerName.includes(kw.toLowerCase()))) return style;
            }
            return { icon: '🛍️', bg: 'from-slate-100 to-slate-200', text: 'text-slate-800', border: 'border-slate-300' };
        }

        function renderLevel1() {
            level1Container.innerHTML = '';
            Object.keys(structuredData).sort().forEach(cat1 => {
                const style = getCatStyle(cat1);
                const card = document.createElement('div');
                card.className = `clickable-card bg-gradient-to-br ${style.bg} p-3 rounded-[2rem] shadow-sm border ${style.border} cursor-pointer transition-all flex flex-col items-center justify-center text-center aspect-square overflow-hidden`;
                card.innerHTML = `<div class="text-4xl mb-2">${style.icon}</div><span class="font-bold ${style.text} text-[13px] leading-snug line-clamp-3 px-1">${cat1}</span>`;
                card.onclick = () => startChat(cat1);
                level1Container.appendChild(card);
            });
        }

        function showLevel1() { chatSection.classList.add('hidden'); level1Section.classList.remove('hidden'); selectedCat1 = null; }

        function startChat(cat1) {
            selectedCat1 = cat1;
            level1Section.classList.add('hidden');
            chatSection.classList.remove('hidden');
            const style = getCatStyle(cat1);
            chatTitle.innerHTML = `<span class="mr-1.5">${style.icon}</span> ${cat1}`;
            chatMessages.innerHTML = '';
            addBotMessage(`${uiText[currentLang].chatWelcome} <strong class="text-blue-600">${style.icon} ${cat1}</strong>。<br>${uiText[currentLang].chatAsk}`);
        }

        function checkSmallTalk(query) {
            const q = query.toLowerCase().replace(/[.,!?。，！？\s]/g, '');
            if (q.length > 20) return null;
            const exclamations = ['omg', 'wow', 'haha', 'lol', '天啊', '救命'];
            if (exclamations.some(kw => q.includes(kw))) return uiText[currentLang].replyEmotion;
            const greetings = ['你好', 'hi', 'hello', '早晨', 'howru'];
            if (greetings.some(kw => q.includes(kw))) return uiText[currentLang].replyGreeting;
            const thanks = ['唔該', '多謝', 'thank', '謝謝'];
            if (thanks.some(kw => q.includes(kw))) return uiText[currentLang].replyThanks;
            return null;
        }

        function submitChat() {
            const query = chatInput.value.trim();
            if (!query) return;
            addUserMessage(query);
            chatInput.value = '';
            chatInput.blur();
            setTimeout(() => {
                const talk = checkSmallTalk(query);
                if (talk) addBotMessage(talk);
                else performScopedSearch(query);
            }, 300);
        }

        function performScopedSearch(query) {
            const q = query.toLowerCase();
            const isShowAll = ['所有', '全部', 'all', 'list', '清單'].some(kw => q.includes(kw));
            let resultsHTML = '';
            Object.keys(structuredData[selectedCat1]).forEach(cat2 => {
                Object.keys(structuredData[selectedCat1][cat2]).forEach(pName => {
                    const info = structuredData[selectedCat1][cat2][pName];
                    if (isShowAll || pName.toLowerCase().includes(q) || info.brand.toLowerCase().includes(q))
                        resultsHTML += generateProductCardHTML(pName, info);
                });
            });
            if (!resultsHTML) addBotMessage(uiText[currentLang].chatNoResult);
            else addBotMessage(isShowAll ? uiText[currentLang].chatShowAll : uiText[currentLang].chatFound, resultsHTML);
        }

        function addBotMessage(text, cardsHTML = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-start w-full';
            wrapper.innerHTML = `<div class="flex items-end gap-2 max-w-[90%]"><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-lg shadow-sm border border-blue-200">🤖</div><div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm text-[15px]">${text}</div></div>${cardsHTML ? `<div class="w-full pl-10 mt-3 space-y-4">${cardsHTML}</div>` : ''}`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-end w-full';
            wrapper.innerHTML = `<div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-sm shadow-md max-w-[85%] text-[15px]">${text}</div>`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        }

        function generateProductCardHTML(pName, info) {
            let valid = info.prices.map(p => parseFloat(p.price)).filter(pr => !isNaN(pr));
            let min = valid.length > 0 ? Math.min(...valid) : null;
            const priceTags = info.prices.map(p => {
                let parsed = parseFloat(p.price);
                let isLowest = (!isNaN(parsed) && parsed === min && valid.length > 1);
                let cls = 'bg-slate-50 text-slate-700 border-slate-200';
                if (p.rawCode === 'WELLCOME') cls = 'bg-red-50 text-red-700 border-red-200';
                else if (p.rawCode === 'PARKNSHOP') cls = 'bg-yellow-50 text-yellow-800 border-yellow-300';
                else if (p.rawCode === 'AEON') cls = 'bg-purple-50 text-purple-700 border-purple-200';
                return `<div class="flex items-center justify-between text-[13px] px-3 py-2 rounded-xl border whitespace-nowrap flex-1 min-w-[45%] ${cls} ${isLowest ? 'ring-2 ring-green-400 font-bold bg-white scale-[1.02]' : 'opacity-80'}"><span>${p.supermarket}</span> <span class="ml-2 text-[15px]">$${isNaN(parsed) ? p.price : parsed.toFixed(1)}${isLowest ? '👍' : ''}</span></div>`;
            }).join('');
            return `<div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex flex-col gap-3 relative"><div class="flex gap-3 items-center"><div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center text-xl border border-slate-100 shadow-inner">🛒</div><div class="flex-1 min-w-0"><div class="text-[11px] text-blue-500 font-extrabold uppercase truncate">${info.brand || '&nbsp;'}</div><h3 class="font-bold text-slate-800 text-[15px] leading-snug">${pName}</h3></div></div><div class="flex flex-wrap gap-2 mt-1">${priceTags}</div></div>`;
        }

        init();
    </script>
</body>
</html>
