<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市格價導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-700">超市價格實時導航</h1>
        <p class="text-gray-500 text-sm">中山全城數據覆蓋</p>
    </header>

    <div id="categoryList" class="grid grid-cols-2 gap-4">
        <p class="col-span-2 text-center text-gray-400">正在加載分類數據...</p>
    </div>

    <script>
        // 自動讀取你 public 資料夾下的數據
        fetch('./public/data/categories_list.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('categoryList');
                container.innerHTML = data.map(cat => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center active:scale-95 transition-transform">
                        <div class="text-3xl mb-2">🛒</div>
                        <div class="font-bold text-gray-800">${cat.name}</div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('categoryList').innerHTML = '<p class="text-red-500 col-span-2 text-center">找不到數據檔案，請檢查 public/data/ 路徑。</p>';
            });
    </script>
</body>
</html>
